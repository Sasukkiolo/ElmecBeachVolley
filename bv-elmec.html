<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ocean:#007A30;--ocean-l:#009C3C;--ocean-pale:#E8F5E9;
  --sand:#D1DF8F;--sand-l:#F9FBE7;--sand-d:#6B9A24;
  --wb:#1565C0;--wb-bg:#E3F2FD;
  --lb:#B71C1C;--lb-bg:#FFEBEE;
  --gf:#2E7D32;--gf-bg:#E8F5E9;
  --win:#1B5E20;
  --txt:#1A1A2E;--txt2:#546E7A;--brd:#CFD8DC;
  --card:#fff;--page:#F2F8F2;
  --r:10px;--r2:6px;
}
body{font-family:'Nunito',sans-serif;background:var(--page);color:var(--txt);min-height:100vh}
h1,h2,h3{font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
header{background:linear-gradient(135deg,#005A22,#007A30 55%,#009C3C);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:14px;box-shadow:0 3px 12px rgba(0,0,0,.25);position:sticky;top:0;z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900}.logo span{color:var(--sand)}
.elmec-logo-svg{height:44px;width:auto;display:block}
.hdr-sub{font-size:11px;opacity:.8;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.spacer{flex:1}
.hdr-btns{display:flex;gap:8px;align-items:center}
.save-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;transition:all .2s}
.save-btn:hover{background:rgba(255,255,255,.28)}
.tabs{display:none}
.tab-btn{display:none}
/* ── Home Screen ──────────────────────────────── */
.home-wrap{padding:32px 20px 24px;max-width:960px;margin:0 auto}
.home-hero{text-align:center;margin-bottom:28px}
.home-hero-logo{display:flex;justify-content:center;margin-bottom:12px}
.home-hero-logo svg{height:70px;width:auto}
.home-sub{font-size:13px;color:var(--txt2);margin-top:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:16px}
.home-card{border:none;border-radius:14px;padding:28px 16px 22px;cursor:pointer;text-align:center;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.home-card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.18)}
.home-card:active{transform:translateY(-1px)}
.hc-icon{font-size:42px;line-height:1;margin-bottom:4px}
.hc-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:.5px;display:block}
.hc-desc{font-size:11px;opacity:.88;font-weight:600;line-height:1.4;display:block}
.hc-squadre{background:linear-gradient(135deg,#005A22,#009C3C);color:#fff}
.hc-gironi{background:linear-gradient(135deg,#4A7800,#92C142);color:#fff}
.hc-tabellone{background:linear-gradient(135deg,#1B5E20,#43A047);color:#fff}
.hc-piano{background:linear-gradient(135deg,#004D40,#00897B);color:#fff}
.hc-stampa{background:linear-gradient(135deg,#37474F,#616266);color:#fff}
.home-save{text-align:center;padding-top:6px}
.home-save-btn{background:linear-gradient(135deg,#4A7800,#92C142);color:#fff;border:none;border-radius:24px;padding:13px 32px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:.5px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:transform .18s,box-shadow .18s}
.home-save-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
/* ── Section back bar ─────────────────────────── */
.sec-bar{background:linear-gradient(135deg,#005A22,#007A30);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:10px;margin:-18px -18px 16px;border-radius:var(--r) var(--r) 0 0}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border:1px solid rgba(255,255,255,.38);border-radius:20px;background:rgba(255,255,255,.12);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap}
.back-btn:hover{background:rgba(255,255,255,.26)}
.sec-bar-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:.4px}
main{padding:18px;max-width:1600px;margin:0 auto}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--brd);overflow:hidden}
.card-hdr{padding:11px 14px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:.4px}
.card-body{padding:14px}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}
.standings{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px}
.standings th{background:var(--ocean-pale);color:var(--ocean);font-weight:700;padding:5px 7px;text-align:center;font-size:11px;text-transform:uppercase}
.standings th:first-child{text-align:left}
.standings td{padding:4px 7px;border-bottom:1px solid #ECEFF1;text-align:center}
.standings td:first-child{text-align:left;font-weight:600}
.standings tr:last-child td{border-bottom:none}
.standings tr:nth-child(even) td{background:#FAFAFA}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;font-size:10px;font-weight:800;margin-right:5px}
.r1{background:#FFD700;color:#5D4037}.r2{background:#C0C0C0;color:#37474F}.r3{background:#CD7F32;color:#fff}.r4{background:#ECEFF1;color:#607D8B}
.match-list{display:flex;flex-direction:column;gap:8px}
.match-card{border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden}
.match-hdr{background:#F5F7FA;padding:4px 9px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:3px}
.match-hdr .lbl{font-weight:700;font-size:11px;color:var(--txt2)}
.match-hdr .rule{font-size:10px;color:#90A4AE;font-style:italic}
.match-teams{padding:7px 9px;display:flex;flex-direction:column;gap:3px}
.team-row{display:flex;align-items:center;gap:7px}
.team-name{flex:1;font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.team-winner .team-name{color:var(--win)}
.set-pts{min-width:20px;text-align:center;font-weight:700;font-size:13px;color:var(--ocean)}
.match-sets{padding:5px 9px 7px;border-top:1px solid #ECEFF1;display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end}
.set-block{display:flex;flex-direction:column;gap:2px;min-width:88px}
.set-block label{font-size:9px;color:#90A4AE;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.set-row{display:flex;align-items:center;gap:3px}
.si{width:36px;height:27px;border:1px solid var(--brd);border-radius:4px;text-align:center;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--txt)}
.si:focus{outline:none;border-color:var(--ocean);box-shadow:0 0 0 2px var(--ocean-pale)}
.set-sep{font-weight:900;color:#90A4AE;font-size:13px}
.exp-lbl{display:flex;align-items:center;gap:3px;font-size:10px;color:#FF7043;font-weight:700;cursor:pointer;white-space:nowrap;margin-top:2px}
.exp-lbl input{width:12px;height:12px;accent-color:#FF7043;cursor:pointer}
.win-dot{width:7px;height:7px;border-radius:50%;background:transparent;flex-shrink:0}
.win-dot.on{background:var(--win)}
.setup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}
.squad-list{display:flex;flex-direction:column;gap:10px}
.squad-card{display:flex;gap:10px;align-items:flex-start;padding:10px;border:1px solid var(--brd);border-radius:var(--r2);background:#FAFBFC}
.squad-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--ocean-pale);background:var(--ocean);border-radius:var(--r2);min-width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.squad-body{flex:1;min-width:0}
.squad-captain-row{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.captain-star{color:var(--sand);font-size:14px;flex-shrink:0}
.ti{flex:1;min-width:0;padding:5px 8px;border:1px solid var(--brd);border-radius:var(--r2);font-size:13px;font-family:'Nunito',sans-serif;font-weight:700;color:var(--ocean);background:#fff}
.ti:focus{outline:none;border-color:var(--ocean);box-shadow:0 0 0 2px var(--ocean-pale)}
.roster-list{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.roster-row{display:flex;align-items:center;gap:5px;padding:1px 0}
.roster-dot{color:var(--txt2);font-size:9px;flex-shrink:0;opacity:.4;margin-top:1px}
.member-input{flex:1;min-width:0;padding:3px 7px;border:1px solid #E8EEF4;border-radius:4px;font-size:12px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--txt2);background:#FAFBFC;transition:border-color .15s,background .15s}
.member-input:focus{outline:none;border-color:var(--ocean);background:#fff;color:var(--txt);box-shadow:0 0 0 2px var(--ocean-pale)}
.roster-count{font-size:10px;color:#90A4AE;font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-top:2px}
/* bracket */
.bsec{margin-bottom:22px}
.bsec-hdr{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.bsec-hdr h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900}
.bdiv{flex:1;height:2px;border-radius:1px}
.wb-c{background:var(--wb)}.lb-c{background:var(--lb)}.gf-c{background:var(--gf)}
.b-rounds{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.b-col{min-width:172px;display:flex;flex-direction:column;gap:7px}
.b-col-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;text-align:center;padding:4px;border-radius:var(--r2);margin-bottom:3px}
.wb-lbl{background:var(--wb-bg);color:var(--wb)}.lb-lbl{background:var(--lb-bg);color:var(--lb)}.gf-lbl{background:var(--gf-bg);color:var(--gf)}
.bm-card{border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden;background:#fff}
.bm-hdr{padding:3px 7px;font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
.wb-bm .bm-hdr{background:var(--wb-bg);color:var(--wb)}.lb-bm .bm-hdr{background:var(--lb-bg);color:var(--lb)}.gf-bm .bm-hdr{background:var(--gf-bg);color:var(--gf)}
.bm-teams{padding:5px 7px;display:flex;flex-direction:column;gap:3px}
.bm-row{display:flex;align-items:center;gap:4px}
.bm-dot{width:6px;height:6px;border-radius:50%;background:#E0E0E0;flex-shrink:0}
.bm-dot.won{background:var(--win)}
.bm-name{flex:1;font-weight:700;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bm-tbd{color:#B0BEC5;font-style:italic;font-weight:400}
.bm-wins{font-size:11px;font-weight:800;color:var(--txt2);min-width:12px;text-align:center}
.bm-wins.won{color:var(--win)}
.bm-sets{padding:4px 7px 6px;border-top:1px solid #F0F0F0;display:flex;gap:5px;flex-wrap:wrap}
.bm-set{display:flex;align-items:center;gap:2px}
.bm-set span{font-size:9px;color:#90A4AE;font-weight:700}
.bm-si{width:28px;height:20px;border:1px solid var(--brd);border-radius:3px;text-align:center;font-size:11px;font-weight:700;font-family:'Nunito',sans-serif}
.bm-si:focus{outline:none;border-color:var(--ocean)}.bm-si:disabled{background:#F5F5F5;color:#B0BEC5}
.bm-sep{font-weight:900;color:#90A4AE;font-size:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border:none;border-radius:var(--r2);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.4px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--ocean);color:#fff}.btn-primary:hover{background:var(--ocean-l)}
.btn-sand{background:var(--sand);color:#5D4037}.btn-sand:hover{background:var(--sand-d);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
.action-bar{display:flex;gap:9px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.info-box{background:var(--sand-l);border:1px solid #FFE082;border-radius:var(--r2);padding:9px 13px;font-size:12px;color:#5D4037;margin-bottom:14px;line-height:1.6}
.info-box strong{color:#F57F17}
.seed-table{width:100%;border-collapse:collapse;font-size:12px}
.seed-table th{background:var(--ocean);color:#fff;padding:6px 9px;text-align:left;font-size:11px;text-transform:uppercase}
.seed-table td{padding:5px 9px;border-bottom:1px solid #ECEFF1}
.seed-table tr:last-child td{border-bottom:none}
.seed-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-weight:800;font-size:10px;background:var(--ocean-pale);color:var(--ocean)}
.winner-banner{background:linear-gradient(135deg,#2E7D32,#388E3C);color:#fff;border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:10px;margin-bottom:18px}
.winner-banner h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900}
/* Piano Partite */
.schedule-day{margin-bottom:20px}
.day-hdr{background:var(--ocean);color:#fff;border-radius:var(--r) var(--r) 0 0;padding:10px 16px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.day-hdr .day-info{font-size:12px;opacity:.8;font-weight:400;font-family:'Nunito',sans-serif}
.day-date-wrap{display:flex;align-items:center;gap:10px}
.day-date-input{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.45);color:#fff;border-radius:6px;padding:3px 9px;font-size:12px;font-family:'Nunito',sans-serif;cursor:pointer;outline:none;transition:background .15s}
.day-date-input:hover{background:rgba(255,255,255,.25)}
.day-date-input::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.8;cursor:pointer}
.bm-date-chip{background:rgba(255,255,255,.22);border-radius:8px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:5px;letter-spacing:.3px;opacity:.9}
.day-body{background:#fff;border:1px solid var(--brd);border-top:none;border-radius:0 0 var(--r) var(--r)}
.schedule-table{width:100%;border-collapse:collapse}
.schedule-table th{background:#F5F7FA;padding:7px 12px;font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--brd)}
.schedule-table td{padding:8px 12px;border-bottom:1px solid #F0F4F8;font-size:13px;vertical-align:top}
.schedule-table tr:last-child td{border-bottom:none}
.schedule-table tr:nth-child(even) td{background:#FAFBFC}
.slot-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--ocean)}
.field-match{font-weight:600}
.field-match .vs{color:var(--txt2);font-weight:400}
.match-type-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-bottom:2px;letter-spacing:.3px}
.wb-badge{background:var(--wb-bg);color:var(--wb)}
.lb-badge{background:var(--lb-bg);color:var(--lb)}
.gf-badge{background:var(--gf-bg);color:var(--gf)}
.g-badge{background:#E3F2FD;color:#0D47A1}
.dep-note{font-size:10px;color:#90A4AE;font-style:italic;margin-top:1px}
/* Print tab */
.print-wrap{background:#fff;border:1px solid var(--brd);border-radius:var(--r);overflow:hidden}
.print-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--brd)}
.print-bar h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900}
.legend-row{display:flex;gap:14px;padding:8px 18px;background:#FAFAFA;border-bottom:1px solid var(--brd);flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700}
.ld{width:11px;height:11px;border-radius:2px}
.svg-scroll{overflow-x:auto;padding:16px 10px}
@media print{
  header,.sec-bar,.print-bar,.legend-row,.action-bar,.info-box{display:none!important}
  body{background:#fff!important}
  main{padding:2px!important}
  .print-wrap{border:none!important}
  .svg-scroll{padding:0!important;overflow:visible!important}
}

<script>
// ═══════════════════════ MATCH LABELS ═══════════════════
const ML={
  W1A:'WB R1 – partita 1',W1B:'WB R1 – partita 2',W1C:'WB R1 – partita 3',W1D:'WB R1 – partita 4',
  W1E:'WB R1 – partita 5',W1F:'WB R1 – partita 6',W1G:'WB R1 – partita 7',W1H:'WB R1 – partita 8',
  W2A:'WB R2 – partita 1',W2B:'WB R2 – partita 2',W2C:'WB R2 – partita 3',W2D:'WB R2 – partita 4',
  WSA:'WB Semifinale 1',WSB:'WB Semifinale 2',WF:'WB Finale',
  L1A:'LB R1 – partita 1',L1B:'LB R1 – partita 2',L1C:'LB R1 – partita 3',L1D:'LB R1 – partita 4',
  L2A:'LB R2 – partita 1',L2B:'LB R2 – partita 2',L2C:'LB R2 – partita 3',L2D:'LB R2 – partita 4',
  L3A:'LB R3 – partita 1',L3B:'LB R3 – partita 2',
  L4A:'LB R4 – partita 1',L4B:'LB R4 – partita 2',
  LSF:'LB Semifinale',LF:'LB Finale',GF1:'Grand Finale',GF2:'Bella (se necessario)',
};

// ═══════════════════════ DATA ═══════════════════════════
const GROUPS=['A','B','C','D'];
const PAIRS=[[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
const GROUP_MATCHES=[];
GROUPS.forEach((g,gi)=>{const b=gi*4;PAIRS.forEach(([a,b2],mi)=>{GROUP_MATCHES.push({id:`G${g}M${mi}`,group:g,t1:b+a,t2:b+b2,num:mi+1});});});

const BRACKET_DEF=[
  // WB Round 1 – schema: M1=A1vsB4, M2=C2vsD3, M3=B1vsC4, M4=D2vsA3,
  //                      M5=C1vsD4, M6=A2vsB3, M7=D1vsA4, M8=B2vsC3
  {id:'W1A',lbl:ML.W1A,type:'wb',t1:{s:0},  t2:{s:13}}, // M1: A1 vs B4
  {id:'W1B',lbl:ML.W1B,type:'wb',t1:{s:6},  t2:{s:11}}, // M2: C2 vs D3
  {id:'W1C',lbl:ML.W1C,type:'wb',t1:{s:1},  t2:{s:14}}, // M3: B1 vs C4
  {id:'W1D',lbl:ML.W1D,type:'wb',t1:{s:7},  t2:{s:8}},  // M4: D2 vs A3
  {id:'W1E',lbl:ML.W1E,type:'wb',t1:{s:2},  t2:{s:15}}, // M5: C1 vs D4
  {id:'W1F',lbl:ML.W1F,type:'wb',t1:{s:4},  t2:{s:9}},  // M6: A2 vs B3

// ═══════════════════════ SCORING ════════════════════════
function isSetDone(s1,s2){
  if(s1===''||s2===''||s1===null||s2===null)return false;
  const a=+s1,b=+s2;if(isNaN(a)||isNaN(b))return false;
  return(a>=15&&a-b>=2)||(b>=15&&b-a>=2);
}
function groupSetScore(s1,s2,exp){
  if(s1===''||s2===''||s1===null||s2===null)return[0,0,0,0];
  const a=+s1,b=+s2;if(isNaN(a)||isNaN(b))return[0,0,0,0];
  if(!exp){if(a>=15&&a-b>=2)return[2,0,1,0];if(b>=15&&b-a>=2)return[0,2,0,1];return[0,0,0,0];}
  if(a>b)return[1,0,1,0];if(b>a)return[0,1,0,1];return[0,0,0,0];
}
function getGroupStandings(gId){
  const gi=GROUPS.indexOf(gId),base=gi*4,stats={};
  for(let i=0;i<4;i++)stats[base+i]={ti:base+i,pts:0,sw:0,sl:0,pf:0,pa:0};
  GROUP_MATCHES.filter(m=>m.group===gId).forEach(mdef=>{
    state.groupMatches[mdef.id].sets.forEach(set=>{
      const[p1,p2,sw1,sw2]=groupSetScore(set.s1,set.s2,set.exp);
      stats[mdef.t1].pts+=p1;stats[mdef.t2].pts+=p2;
      stats[mdef.t1].sw+=sw1;stats[mdef.t2].sw+=sw2;
      stats[mdef.t1].sl+=sw2;stats[mdef.t2].sl+=sw1;
      const a=+set.s1||0,b=+set.s2||0;
      stats[mdef.t1].pf+=a;stats[mdef.t1].pa+=b;
      stats[mdef.t2].pf+=b;stats[mdef.t2].pa+=a;
    });
  });
  return Object.values(stats).sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const ad=a.sw-a.sl,bd=b.sw-b.sl;if(bd!==ad)return bd-ad;
    return(b.pf-b.pa)-(a.pf-a.pa);
  });
}
function computeSeeds(){
  const r={};GROUPS.forEach(g=>{r[g]=getGroupStandings(g);});
  const seeds=[],seedsInfo=[];
  for(let pos=0;pos<4;pos++)GROUPS.forEach(g=>{
    seeds.push(r[g][pos].ti);
    seedsInfo.push({ti:r[g][pos].ti,group:g,rank:pos+1});
  });
  return{seeds,seedsInfo};
}

// ═══════════════════════ BRACKET ════════════════════════
function bTeam(src){
  if(!src)return null;
  if(src.s!==undefined)return state.seeds[src.s]!==undefined?state.seeds[src.s]:null;
  const r=src.w?bResult(src.w):bResult(src.l);
  return r?(src.w?r.winner:r.loser):null;
}
function bResult(mid){
  const ms=state.bracketMatches[mid],mdef=BMAP[mid];
  const t1=bTeam(mdef.t1),t2=bTeam(mdef.t2);
  if(t1===null||t2===null)return null;
  let w1=0,w2=0;
  ms.sets.forEach(s=>{if(isSetDone(s.s1,s.s2))(+s.s1>+s.s2?w1++:w2++);});
  if(w1>=2)return{winner:t1,loser:t2};if(w2>=2)return{winner:t2,loser:t1};return null;
}
function bWinner(mid){const r=bResult(mid);return r?r.winner:null;}
function tn(ti){return ti===null||ti===undefined?'???':state.teams[ti]||`Sq.${ti+1}`;}
function srcLbl(src){
  if(!src)return'TBD';
  if(src.s!==undefined){const ti=state.seeds[src.s];return ti!==undefined?tn(ti):`Testa #${src.s+1}`;}
  const mid=src.w||src.l,r=bResult(mid);
  if(r)return src.w?tn(r.winner):tn(r.loser);
  return src.w?`Vin. ${ML[mid]||mid}`:`Sconf. ${ML[mid]||mid}`;
}

function rBSec(rounds,type){
  return rounds.map(r=>{
    const cards=r.ids.map(id=>rBMatch(id)).join('');
    return`<div class="b-col"><div class="b-col-lbl ${type}-lbl">${r.lbl}</div>${cards}</div>`;
  }).join('');
}
function rBMatch(mid){
  const mdef=BMAP[mid],ms=state.bracketMatches[mid];
  const t1=bTeam(mdef.t1),t2=bTeam(mdef.t2);
  const res=bResult(mid);
  let sw1=0,sw2=0;
  ms.sets.forEach(s=>{if(isSetDone(s.s1,s.s2))(+s.s1>+s.s2?sw1++:sw2++);});
  const w1=res&&res.winner===t1,w2=res&&res.winner===t2;
  const show3=sw1===1&&sw2===1;
  const sets=ms.sets.map((set,si)=>{
    if(si===2&&!show3&&set.s1===''&&set.s2==='')return'';
    const locked=(w1||w2)&&!isSetDone(set.s1,set.s2);
    return`<div class="bm-set"><span>S${si+1}</span><input class="bm-si" type="number" min="0" max="30" data-bm="${mid}" data-si="${si}" data-w="s1" value="${set.s1}" ${locked?'disabled':''}><span class="bm-sep">–</span><input class="bm-si" type="number" min="0" max="30" data-bm="${mid}" data-si="${si}" data-w="s2" value="${set.s2}" ${locked?'disabled':''}></div>`;
  }).join('');
  const di=MATCH_DAY[mid];
  const dateChip=di!==undefined&&state.dayDates[di]?`<span class="bm-date-chip">${fmtDate(state.dayDates[di])}</span>`:'';
  return`<div class="bm-card ${mdef.type}-bm"><div class="bm-hdr">${mdef.lbl}${dateChip}</div><div class="bm-teams"><div class="bm-row"><div class="bm-dot ${w1?'won':''}"></div><div class="bm-name ${t1===null?'bm-tbd':''}">${t1!==null?esc(tn(t1)):esc(srcLbl(mdef.t1))}</div><div class="bm-wins ${w1?'won':''}">${sw1||''}</div></div><div class="bm-row"><div class="bm-dot ${w2?'won':''}"></div><div class="bm-name ${t2===null?'bm-tbd':''}">${t2!==null?esc(tn(t2)):esc(srcLbl(mdef.t2))}</div><div class="bm-wins ${w2?'won':''}">${sw2||''}</div></div></div><div class="bm-sets">${sets}</div></div>`;
}

function slotCell(slot){
  if(!slot)return`<span style="color:#CFD8DC;font-style:italic">—</span>`;
  if(slot.type==='group'){
    const t1n=esc(tn(slot.t1)),t2n=esc(tn(slot.t2));
    return`<div><span class="match-type-badge g-badge">Girone ${slot.group}</span><div class="field-match">${t1n} <span class="vs">vs</span> ${t2n}</div></div>`;
  }
  if(slot.type==='bracket'){
    const mdef=BMAP[slot.mid];
    const t1=bTeam(mdef.t1),t2=bTeam(mdef.t2);
    const n1=t1!==null?esc(tn(t1)):esc(srcLbl(mdef.t1));
    const n2=t2!==null?esc(tn(t2)):esc(srcLbl(mdef.t2));
    const badgeClass=slot.btype+'-badge';
    const shortLbl=slot.slbl||ML[slot.mid]||slot.mid;
    return`<div><span class="match-type-badge ${badgeClass}">${shortLbl}</span><div class="field-match">${n1} <span class="vs">vs</span> ${n2}</div>${slot.dep?`<div class="dep-note">⚠ dopo ${slot.dep}</div>`:''}</div>`;
  }
  return'';
}
function mkBSlot(mid,btype,slbl,dep){return{type:'bracket',mid,btype,slbl,dep};}
function buildSchedule(){
  const days=[];
  // ── Optimal group-day builder ──────────────────────────────────────────
  // K4 has exactly 3 perfect matchings (pairs of independent matches).
  // Strategy: run both fields for the SAME group at the same time (using a
  // perfect matching), then switch to the OTHER group. This gives every team
  // a gap of exactly 2 time-slots between each of their 3 matches — the
  // theoretical maximum with 6 slots and 4 teams.
  //
  //  Slot 1 → both fields: group X  (perfect matching 1)
  //  Slot 2 → both fields: group Y  (perfect matching 1)
  //  Slot 3 → both fields: group X  (perfect matching 2)
  //  Slot 4 → both fields: group Y  (perfect matching 2)
  //  Slot 5 → both fields: group X  (perfect matching 3)
  //  Slot 6 → both fields: group Y  (perfect matching 3)
  // Result: teams of X play in slots {1,3,5} → pausa 2 tra ogni partita ✓
  //         teams of Y play in slots {2,4,6} → pausa 2 tra ogni partita ✓
  const PM=[[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]]; // 3 perfect matchings of K4

  function buildGroupDay(title,gX,gY,baseX,baseY){
    const day={title,matches:12,slots:[]};
    PM.forEach(([p1,p2])=>{
      day.slots.push({
        f1:{type:'group',group:gX,t1:baseX+p1[0],t2:baseX+p1[1]},
        f2:{type:'group',group:gX,t1:baseX+p2[0],t2:baseX+p2[1]},
      });
      day.slots.push({
        f1:{type:'group',group:gY,t1:baseY+p1[0],t2:baseY+p1[1]},
        f2:{type:'group',group:gY,t1:baseY+p2[0],t2:baseY+p2[1]},
      });
    });
    return day;
  }

  days.push(buildGroupDay('Giornata 1 – Gironi A e B','A','B',0,4));
  days.push(buildGroupDay('Giornata 2 – Gironi C e D','C','D',8,12));
  // ── BRACKET GIORNATA 3: metà alta (top 8 squadre) ─────────────────────
  // Sequenza in-day (dipendenze soddisfatte nello stesso giorno):
  //  Slot 1-2: WB R1 top (W1A–D)  → Slot 3: LB R1 top (L1A,L1B, usa perdenti W1A–D)
  //  Slot 4:   WB R2 top (W2A,W2B) → Slot 5: LB R2 top (L2A,L2B, usa perdenti W2A,W2B + vincitori L1A,L1B)
  //  Slot 6:   WB SF-1 (WSA) ‖ LB R3 top (L3A) [dipende da slot 4+5]
  days.push({title:'Giornata 3 – Tabellone ½ alta (A1,B4,C2,D3,B1,C4,D2,A3)',matches:11,slots:[
    {f1:mkBSlot('W1A','wb','WB R1-M1'),        f2:mkBSlot('W1B','wb','WB R1-M2')},
    {f1:mkBSlot('W1C','wb','WB R1-M3'),        f2:mkBSlot('W1D','wb','WB R1-M4')},
    {f1:mkBSlot('L1A','lb','LB R1-1','dopo WB R1-M1/M2'),f2:mkBSlot('L1B','lb','LB R1-2','dopo WB R1-M3/M4')},
    {f1:mkBSlot('W2A','wb','WB R2-1','dopo WB R1-M1/M2'),f2:mkBSlot('W2B','wb','WB R2-2','dopo WB R1-M3/M4')},
    {f1:mkBSlot('L2A','lb','LB R2-1','dopo L1-1 + WB R2-1'),f2:mkBSlot('L2B','lb','LB R2-2','dopo L1-2 + WB R2-2')},
    {f1:mkBSlot('L3A','lb','LB R3-1','dopo LB R2-1/2'),f2:null},
  ]});
  // ── BRACKET GIORNATA 4: metà bassa (bottom 8 squadre) ─────────────────
  days.push({title:'Giornata 4 – Tabellone ½ bassa (C1,D4,A2,B3,D1,A4,B2,C3)',matches:11,slots:[
    {f1:mkBSlot('W1E','wb','WB R1-M5'),        f2:mkBSlot('W1F','wb','WB R1-M6')},
    {f1:mkBSlot('W1G','wb','WB R1-M7'),        f2:mkBSlot('W1H','wb','WB R1-M8')},
    {f1:mkBSlot('L1C','lb','LB R1-3','dopo WB R1-M5/M6'),f2:mkBSlot('L1D','lb','LB R1-4','dopo WB R1-M7/M8')},
    {f1:mkBSlot('W2C','wb','WB R2-3','dopo WB R1-M5/M6'),f2:mkBSlot('W2D','wb','WB R2-4','dopo WB R1-M7/M8')},
    {f1:mkBSlot('L2C','lb','LB R2-3','dopo L1-3 + WB R2-3'),f2:mkBSlot('L2D','lb','LB R2-4','dopo L1-4 + WB R2-4')},
    {f1:mkBSlot('L3B','lb','LB R3-2','dopo LB R2-3/4'),f2:null},
  ]});
  // ── BRACKET GIORNATA 5: Semifinali + Finali ────────────────────────────
  days.push({title:'Giornata 5 – Semifinali e Finali',matches:'9 (+1 bella)',slots:[
    {f1:mkBSlot('WSA','wb','WB Semifinale 1','dopo WB R2-1/2 (G3)'),f2:mkBSlot('WSB','wb','WB Semifinale 2','dopo WB R2-3/4 (G4)')},
    {f1:mkBSlot('L4A','lb','LB R4-1','dopo WB SF-1 + LB R3-1'),f2:mkBSlot('L4B','lb','LB R4-2','dopo WB SF-2 + LB R3-2')},
    {f1:mkBSlot('WF','wb','WB Finale','dopo WB SF-1/2'),f2:mkBSlot('LSF','lb','LB Semifinale','dopo LB R4-1/2')},
    {f1:mkBSlot('LF','lb','LB Finale','dopo WB Fin. + LB Semi.'),f2:null},
    {f1:mkBSlot('GF1','gf','Grand Finale','dopo LB Finale'),f2:null},
    {f1:mkBSlot('GF2','gf','Bella (se necessario)','solo se vince LB in GF1'),f2:null},
  ]});
  return days;
}

function rPrint(){
  if(!state.seedsLocked)return`${secBar('🖨️ Stampa')}<div class="card" style="text-align:center;padding:40px"><div style="font-size:44px;margin-bottom:10px">🖨️</div><h2 style="font-size:20px;margin-bottom:8px">Genera prima il Tabellone</h2><p style="color:var(--txt2);margin-bottom:18px">Vai ai Gironi e clicca "Genera Tabellone".</p><button class="btn btn-primary" onclick="setTab('gironi')">Vai ai Gironi →</button></div>`;
  return`${secBar('🖨️ Stampa')}<div class="print-wrap"><div class="print-bar"><div><h2>Tabellone – Vista Stampa (A3 orizzontale)</h2><div style="font-size:11px;color:var(--txt2);margin-top:2px">Linee continue = percorso vincitori · Linee tratteggiate = perdenti che passano al LB</div></div><button class="btn btn-primary btn-sm" onclick="doPrint()">🖨️ Stampa / PDF</button></div><div class="legend-row"><div class="li"><div class="ld" style="background:#1565C0"></div>Winners Bracket</div><div class="li"><div class="ld" style="background:#B71C1C"></div>Losers Bracket</div><div class="li"><div class="ld" style="background:#2E7D32"></div>Grand Finale</div><div class="li"><div class="ld" style="background:#B71C1C;opacity:.5;border:1px dashed #B71C1C"></div>Feed perdenti WB → LB</div></div><div class="svg-scroll">${buildSVG()}</div></div>`;
}

function buildSVG(){
  // ── Layout constants ─────────────────────────────────
  const BW=185, BH=66, R=4;
  // Column x positions: first col at x=60 (leaves 60px left margin for dashed lines)
  // Column gap = 225-185 = 40px between boxes
  const COL=[60,285,510,735]; // 4 WB columns = also first 4 LB columns
  const LBCOL=[60,285,510,735,960,1185]; // 6 LB columns
  const GF_COL=[1410,1635]; // GF columns

  // ── Helper: compute y for a box given its center_y ───
  // WB R1: 8 boxes, spacing=130 (was 115), box height=66
  const WR=[35,165,295,425,555,685,815,945]; // y of W1A..W1H (spacing=130, gap=64px)
  // WB R2: midpoints of R1 pairs
  const W2Y=[Math.round((WR[0]+WR[1])/2+BH/2)-Math.round(BH/2),
             Math.round((WR[2]+WR[3])/2+BH/2)-Math.round(BH/2),
             Math.round((WR[4]+WR[5])/2+BH/2)-Math.round(BH/2),
             Math.round((WR[6]+WR[7])/2+BH/2)-Math.round(BH/2)];
  // WB SF, WF
  const cY=y=>y+BH/2; // center y of a box at y
  const WSY=[Math.round((cY(W2Y[0])+cY(W2Y[1]))/2-BH/2),
             Math.round((cY(W2Y[2])+cY(W2Y[3]))/2-BH/2)];
  const WFY=Math.round((cY(WSY[0])+cY(WSY[1]))/2-BH/2);

  // LB R1: 4 boxes, spacing=240 (wider since only 4 boxes, and BH larger)
  const LB_OFF=1085; // y where LB section starts (after WB ends at ~1031 + 54px header gap)
  const LR=[LB_OFF,LB_OFF+240,LB_OFF+480,LB_OFF+720]; // y of L1A..L1D
  // LB R3: midpoints of LBR2 pairs (same y as R1 since R2 directly connects)
  const L3Y=[Math.round((cY(LR[0])+cY(LR[1]))/2-BH/2),
             Math.round((cY(LR[2])+cY(LR[3]))/2-BH/2)];
  const LSFY=Math.round((cY(L3Y[0])+cY(L3Y[1]))/2-BH/2);
  const GF_Y=Math.round((cY(WFY)+cY(LSFY))/2-BH/2);

  // ── Box positions ────────────────────────────────────
  const P={
    W1A:[COL[0],WR[0]],  W1B:[COL[0],WR[1]],  W1C:[COL[0],WR[2]],  W1D:[COL[0],WR[3]],
    W1E:[COL[0],WR[4]],  W1F:[COL[0],WR[5]],  W1G:[COL[0],WR[6]],  W1H:[COL[0],WR[7]],
    W2A:[COL[1],W2Y[0]], W2B:[COL[1],W2Y[1]], W2C:[COL[1],W2Y[2]], W2D:[COL[1],W2Y[3]],
    WSA:[COL[2],WSY[0]], WSB:[COL[2],WSY[1]],
    WF: [COL[3],WFY],
    L1A:[LBCOL[0],LR[0]],L1B:[LBCOL[0],LR[1]],L1C:[LBCOL[0],LR[2]],L1D:[LBCOL[0],LR[3]],
    L2A:[LBCOL[1],LR[0]],L2B:[LBCOL[1],LR[1]],L2C:[LBCOL[1],LR[2]],L2D:[LBCOL[1],LR[3]],
    L3A:[LBCOL[2],L3Y[0]],L3B:[LBCOL[2],L3Y[1]],
    L4A:[LBCOL[3],L3Y[0]],L4B:[LBCOL[3],L3Y[1]],
    LSF:[LBCOL[4],LSFY], LF:[LBCOL[5],LSFY],
    GF1:[GF_COL[0],GF_Y],GF2:[GF_COL[1],GF_Y],
  };
  const cx=id=>P[id][0]+BW/2, cy=id=>P[id][1]+BH/2;
  const rx=id=>P[id][0]+BW,   lx=id=>P[id][0];
  const s1y=id=>P[id][1]+BH*0.455;  // slot1 (upper team) center y — below 18px header
  const s2y=id=>P[id][1]+BH*0.818;  // slot2 (lower team) center y

  const WBC='#1565C0',LBC='#B71C1C',GFC='#2E7D32',CROSS='#C62828';

  // ── Connection lines (T-join) ─────────────────────────
  function conn(s,d,slot,stroke,op=0.72){
    const x1=rx(s),y1=cy(s),x2=lx(d),y2=slot===1?s1y(d):s2y(d),mx=(x1+x2)/2;
    return`<path d="M${x1},${y1} H${mx} V${y2} H${x2}" fill="none" stroke="${stroke}" stroke-width="1.6" opacity="${op}"/>`;
  }
  function vjoin(s1,s2,d,stroke){
    const mx=(rx(s1)+lx(d))/2,y1=cy(s1),y2=cy(s2);
    return`<line x1="${mx}" y1="${y1}" x2="${mx}" y2="${y2}" stroke="${stroke}" stroke-width="1.6" opacity="0.72"/>`;
  }

  // ── WB section lines ──────────────────────────────────
  const wbL=[
    conn('W1A','W2A',1,WBC),conn('W1B','W2A',2,WBC),vjoin('W1A','W1B','W2A',WBC),
    conn('W1C','W2B',1,WBC),conn('W1D','W2B',2,WBC),vjoin('W1C','W1D','W2B',WBC),
    conn('W1E','W2C',1,WBC),conn('W1F','W2C',2,WBC),vjoin('W1E','W1F','W2C',WBC),
    conn('W1G','W2D',1,WBC),conn('W1H','W2D',2,WBC),vjoin('W1G','W1H','W2D',WBC),
    conn('W2A','WSA',1,WBC),conn('W2B','WSA',2,WBC),vjoin('W2A','W2B','WSA',WBC),
    conn('W2C','WSB',1,WBC),conn('W2D','WSB',2,WBC),vjoin('W2C','W2D','WSB',WBC),
    conn('WSA','WF',1,WBC), conn('WSB','WF',2,WBC), vjoin('WSA','WSB','WF',WBC),
  ].join('');

  // ── LB section lines ──────────────────────────────────
  const lbL=[
    conn('L1A','L2A',1,LBC),conn('L1B','L2B',1,LBC),
    conn('L1C','L2C',1,LBC),conn('L1D','L2D',1,LBC),
    conn('L2A','L3A',1,LBC),conn('L2B','L3A',2,LBC),vjoin('L2A','L2B','L3A',LBC),
    conn('L2C','L3B',1,LBC),conn('L2D','L3B',2,LBC),vjoin('L2C','L2D','L3B',LBC),
    conn('L3A','L4A',2,LBC),conn('L3B','L4B',2,LBC),
    conn('L4A','LSF',1,LBC),conn('L4B','LSF',2,LBC),vjoin('L4A','L4B','LSF',LBC),
    conn('LSF','LF',2,LBC),
  ].join('');

  // ── GF lines ──────────────────────────────────────────
  const gfL=[
    conn('WF','GF1',1,GFC,.85), conn('LF','GF1',2,GFC,.85), vjoin('WF','LF','GF1',GFC),
    conn('GF1','GF2',1,GFC,.85),conn('GF1','GF2',2,GFC,.85),
  ].join('');

  // ── Cross-section dashed lines ────────────────────────
  // Routes use dedicated channels in the gaps BETWEEN adjacent columns,
  // ensuring zero overlap with any match box.

  // Route LEFT from source's left edge through margin channels (x < COL[0]=60)
  // Channel spacing 6px: ch=0→x=4, ch=1→x=10, ..., ch=7→x=46
  function dashLeft(srcId,dstId,dstSlot,ch){
    const rx=6+ch*7, x1=lx(srcId), y1=cy(srcId);
    const x2=lx(dstId), y2=dstSlot===1?s1y(dstId):s2y(dstId);
    return`<path d="M${x1},${y1} H${rx} V${y2} H${x2}" fill="none" stroke="${CROSS}" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.55"/>`;
  }
  // Route LEFT from source's left edge through gap between LBR1 and LBR2
  // Gap = COL[0]+BW(245) to COL[1](285): channels at 248,254,260,266
  function dashMid(srcId,dstId,ch){
    const rx=248+ch*6, x1=lx(srcId), y1=cy(srcId);
    const x2=lx(dstId), y2=s2y(dstId);
    return`<path d="M${x1},${y1} H${rx} V${y2} H${x2}" fill="none" stroke="${CROSS}" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.5"/>`;
  }
  // Route RIGHT from source's right edge into gap between LBR3 and LBR4
  // Gap = COL[2]+BW(695) to COL[3](735): channels at 698,704
  function dashSF(srcId,dstId,ch){
    const rx2=698+ch*6, x1=rx(srcId), y1=cy(srcId);
    const x2=lx(dstId), y2=s1y(dstId);
    return`<path d="M${x1},${y1} H${rx2} V${y2} H${x2}" fill="none" stroke="${CROSS}" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.5"/>`;
  }
  // WF loser → LF: route around the far right edge of SVG
  function dashWF(){
    const SVG_R=GF_COL[1]+BW+15; // far right
    const x1=rx('WF'),y1=cy('WF'),x2=lx('LF'),y2=s1y('LF');
    return`<path d="M${x1},${y1} H${SVG_R} V${y2} H${x2}" fill="none" stroke="${CROSS}" stroke-width="1.4" stroke-dasharray="5,3" opacity="0.5"/>`;
  }

  // LB R1 straight pairings: W1A/B→L1A (top), W1C/D→L1B (top), W1E/F→L1C (bot), W1G/H→L1D (bot)
  const dashR1=[
    dashLeft('W1A','L1A',1,0),dashLeft('W1B','L1A',2,1),
    dashLeft('W1C','L1B',1,2),dashLeft('W1D','L1B',2,3),
    dashLeft('W1E','L1C',1,4),dashLeft('W1F','L1C',2,5),
    dashLeft('W1G','L1D',1,6),dashLeft('W1H','L1D',2,7),
  ].join('');
  // LB R2 straight pairings: W2A→L2A (top), W2B→L2B (top), W2C→L2C (bot), W2D→L2D (bot)
  const dashR2=[dashMid('W2A','L2A',0),dashMid('W2B','L2B',1),dashMid('W2C','L2C',2),dashMid('W2D','L2D',3)].join('');
  // LB R4: WSA→L4A, WSB→L4B (slot1)
  const dashR4=[dashSF('WSA','L4A',0),dashSF('WSB','L4B',1)].join('');

  // ── Match boxes ───────────────────────────────────────
  const COLORS={wb:[WBC,'#BBDEFB','#F5FAFF'],lb:[LBC,'#FFCDD2','#FFF5F5'],gf:[GFC,'#C8E6C9','#F2F9F2']};
  function box(mdef){
    const p=P[mdef.id];if(!p)return'';
    const[hc,bc,bg]=COLORS[mdef.type]||COLORS.wb;
    const t1=bTeam(mdef.t1),t2=bTeam(mdef.t2),res=bResult(mdef.id);
    const ms=state.bracketMatches[mdef.id];
    let sw1=0,sw2=0;
    ms.sets.forEach(s=>{if(isSetDone(s.s1,s.s2))(+s.s1>+s.s2?sw1++:sw2++);});
    const w1=res&&res.winner===t1,w2=res&&res.winner===t2;
    // Team name: truncate to 22 chars (box is wide enough for ~22 chars at 9px)
    const n1=esc((t1!==null?tn(t1):srcLbl(mdef.t1)).substring(0,22));
    const n2=esc((t2!==null?tn(t2):srcLbl(mdef.t2)).substring(0,22));
    const score=(sw1>0||sw2>0)?` · ${sw1}–${sw2}`:'';
    const shortHdr=mdef.lbl.replace(' – partita ',' P').replace('WB ','').replace('LB ','LB ').replace('Grand Finale','GF').replace('Bella (se necessario)','Bella');
    const[x,y]=p,M='#90A4AE';
    const dot1=w1?`<circle cx="${x+10}" cy="${y+BH*.455}" r="4.5" fill="#1B5E20"/>`:`<circle cx="${x+10}" cy="${y+BH*.455}" r="3.5" fill="none" stroke="#BDBDBD" stroke-width="1.2"/>`;
    const dot2=w2?`<circle cx="${x+10}" cy="${y+BH*.818}" r="4.5" fill="#1B5E20"/>`:`<circle cx="${x+10}" cy="${y+BH*.818}" r="3.5" fill="none" stroke="#BDBDBD" stroke-width="1.2"/>`;
    const di=MATCH_DAY[mdef.id];
    const dateStr=di!==undefined?fmtDate(state.dayDates[di]):'';
    return`<g>
      <rect x="${x}" y="${y}" width="${BW}" height="${BH}" rx="${R}" fill="${bg}" stroke="${bc}" stroke-width="1.1"/>
      <rect x="${x}" y="${y}" width="${BW}" height="18" rx="${R}" fill="${hc}"/>
      <rect x="${x}" y="${y+9}" width="${BW}" height="9" fill="${hc}"/>
      <text x="${x+BW/2}" y="${y+13}" text-anchor="middle" font-size="10" fill="white" font-family="Arial" font-weight="700" letter-spacing=".3">${shortHdr}${score}</text>
      <line x1="${x}" y1="${y+18}" x2="${x+BW}" y2="${y+18}" stroke="${bc}" stroke-width="0.5"/>
      <line x1="${x}" y1="${y+BH/2}" x2="${x+BW}" y2="${y+BH/2}" stroke="${bc}" stroke-width="0.4" opacity=".4"/>
      ${dot1}
      <text x="${x+19}" y="${y+BH*.455+4.5}" font-size="12" fill="${t1===null?M:w1?'#1B5E20':'#1A1A2E'}" font-family="Arial" font-weight="${w1?'bold':'normal'}" font-style="${t1===null?'italic':'normal'}">${n1}</text>
      ${dot2}
      <text x="${x+19}" y="${y+BH*.818+4.5}" font-size="12" fill="${t2===null?M:w2?'#1B5E20':'#1A1A2E'}" font-family="Arial" font-weight="${w2?'bold':'normal'}" font-style="${t2===null?'italic':'normal'}">${n2}</text>
      ${dateStr?`<text x="${x+BW/2}" y="${y+BH+11}" text-anchor="middle" font-size="9.5" fill="#555" font-family="Arial" font-style="italic" opacity=".85">📅 ${dateStr}</text>`:''}
    </g>`;
  }
  const boxes=BRACKET_DEF.map(box).join('');

  // ── Section backgrounds & labels ──────────────────────
  const WB_END=WR[7]+BH+20, LB_S=LB_OFF-28, LB_END=LR[3]+BH+20;
  const GFX=GF_COL[0]-8, GFW=GF_COL[1]+BW+18-GFX;
  const bgs=`
    <rect x="0" y="0" width="${COL[3]+BW+20}" height="${WB_END}" rx="6" fill="#F5F9FF" stroke="#C5D8F8" stroke-width="1"/>
    <rect x="0" y="${LB_S}" width="${LBCOL[5]+BW+20}" height="${LB_END-LB_S}" rx="6" fill="#FFF5F5" stroke="#FFCDD2" stroke-width="1"/>
    <rect x="${GFX}" y="${GF_Y-22}" width="${GFW}" height="${BH+46}" rx="6" fill="#F2F9F2" stroke="#C8E6C9" stroke-width="1"/>
    <text x="62" y="16" font-size="11" font-weight="700" fill="${WBC}" font-family="Arial" letter-spacing="1" opacity=".7">WINNERS BRACKET</text>
    <text x="62" y="${LB_S+16}" font-size="11" font-weight="700" fill="${LBC}" font-family="Arial" letter-spacing="1" opacity=".7">LOSERS BRACKET</text>
    <text x="${GFX+8}" y="${GF_Y-9}" font-size="11" font-weight="700" fill="${GFC}" font-family="Arial" letter-spacing="1" opacity=".7">GRAND FINALE</text>`;

  function rh(x,y,lbl,c){return`<text x="${x+BW/2}" y="${y}" text-anchor="middle" font-size="11" font-weight="700" fill="${c}" font-family="Arial" opacity=".75">${lbl}</text>`;}
  const WH=22, LH=LB_S+16;
  const hdrs=[
    rh(COL[0],WH,'R1 – 8 partite',WBC), rh(COL[1],WH,'R2 – 4 partite',WBC),
    rh(COL[2],WH,'WB Semifinali',WBC),   rh(COL[3],WH,'WB Finale',WBC),
    rh(LBCOL[0],LH,'LB Round 1',LBC),   rh(LBCOL[1],LH,'LB Round 2',LBC),
    rh(LBCOL[2],LH,'LB Round 3',LBC),   rh(LBCOL[3],LH,'LB Round 4',LBC),
    rh(LBCOL[4],LH,'LB Semifin.',LBC),  rh(LBCOL[5],LH,'LB Finale',LBC),
  ].join('');

  const LEG_Y=LB_END+12;
  const SVG_W=GF_COL[1]+BW+20, SVG_H=LEG_Y+22;
  const legend=`
    <rect x="4" y="${LEG_Y}" width="420" height="22" rx="3" fill="#F5F5F5" stroke="#E0E0E0" stroke-width=".5"/>
    <line x1="12" y1="${LEG_Y+11}" x2="36" y2="${LEG_Y+11}" stroke="${WBC}" stroke-width="1.5" opacity=".7"/>
    <text x="40" y="${LEG_Y+15}" font-size="10" fill="#555" font-family="Arial">Vincitore avanza (WB/LB/GF)</text>
    <line x1="200" y1="${LEG_Y+11}" x2="224" y2="${LEG_Y+11}" stroke="${CROSS}" stroke-width="1.2" stroke-dasharray="5,3" opacity=".55"/>
    <text x="228" y="${LEG_Y+15}" font-size="10" fill="#555" font-family="Arial">Perdente passa al LB (tratteggiato)</text>`;

  return`<svg id="bracket-svg" viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:1000px;height:auto;display:block">
  ${bgs}${hdrs}
  <g opacity="1">${dashR1}${dashR2}${dashR4}${dashWF()}</g>
  <g>${wbL}${lbL}${gfL}</g>
  <g>${boxes}</g>
  ${legend}
  </svg>`;
}

// ═══════════════════════ SAVE ════════════════════════════
function hashPwd(s){
  let h=5381;const k=s+'bv_salt_2025';
  for(let i=0;i<k.length;i++){h=((h<<5)-h)+k.charCodeAt(i);h=h&h;}
  return Math.abs(h).toString(16).padStart(8,'0');
}
function doSave(){
  if(!state.pwdHash){
    const p1=prompt('Crea una password per proteggere il file:');
    if(!p1||!p1.trim())return;
    const p2=prompt('Conferma password:');
    if(p1!==p2){alert('Le password non coincidono.');return;}
    state.pwdHash=hashPwd(p1);
  } else {
    const p=prompt('Inserisci la password per salvare:');
    if(!p){return;}
    if(hashPwd(p)!==state.pwdHash){alert('Password errata. Salvataggio annullato.');return;}
  }
  const json=JSON.stringify(state);
  let html=document.documentElement.outerHTML;
  html=html.replace(/<script id="state-init">[\s\S]*?<\/script>/,
    `<script id="state-init">var SAVED_STATE=${json};<\/script>`);
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='elmec_torneo.html';a.click();
  URL.revokeObjectURL(url);
  setTimeout(()=>alert('\u2705 File salvato! Riaprilo nel browser per continuare.'),100);
}

// \u2550\u2550\u2550 HANDLERS \u2550\u2550\u2550
function attachHandlers(){
  document.querySelectorAll('.ti').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const ti=+e.target.dataset.ti;
      state.teams[ti]=e.target.value;
      if(state.rosters[ti])state.rosters[ti][0]=e.target.value;
    });
  });
  document.querySelectorAll('.day-date-input').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const di=+e.target.dataset.di;
      if(!state.dayDates)state.dayDates=Array(5).fill('');
      state.dayDates[di]=e.target.value;
      renderMain();
    });
  });
  document.querySelectorAll('.member-input').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const ri=+e.target.dataset.ri, mi=+e.target.dataset.mi;
      if(!state.rosters[ri])state.rosters[ri]=[];
      state.rosters[ri][mi]=e.target.value;
    });
  });
  document.querySelectorAll('[data-gm]').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const ms=state.groupMatches[e.target.dataset.gm].sets[+e.target.dataset.si];
      const wh=e.target.dataset.wh;
      ms[wh]=wh==='exp'?e.target.checked:e.target.value;
      renderMain();
    });
  });
  document.querySelectorAll('[data-bm]').forEach(inp=>{
    inp.addEventListener('change',e=>{
      state.bracketMatches[e.target.dataset.bm].sets[+e.target.dataset.si][e.target.dataset.w]=e.target.value;
      renderMain();
    });
  });
}
function doGenSeeds(){
  const{seeds,seedsInfo}=computeSeeds();
  state.seeds=seeds;state.seedsInfo=seedsInfo;
  BRACKET_DEF.forEach(m=>{state.bracketMatches[m.id]={sets:[{s1:'',s2:''},{s1:'',s2:''},{s1:'',s2:''}]};});
  state.seedsLocked=true;setTab('tabellone');
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// \u2550\u2550\u2550 INIT \u2550\u2550\u2550
if(typeof SAVED_STATE!=='undefined'&&SAVED_STATE!==null)restoreState(SAVED_STATE);
renderMain();
</script>

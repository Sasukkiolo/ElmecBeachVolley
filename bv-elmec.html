<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ocean:#0D47A1;--ocean-l:#1565C0;--ocean-pale:#E3F2FD;
  --sand:#F9A825;--sand-l:#FFF8E1;--sand-d:#F57F17;
  --wb:#1565C0;--wb-bg:#E3F2FD;
  --lb:#B71C1C;--lb-bg:#FFEBEE;
  --gf:#2E7D32;--gf-bg:#E8F5E9;
  --win:#1B5E20;
  --txt:#1A1A2E;--txt2:#546E7A;--brd:#CFD8DC;
  --card:#fff;--page:#F0F4F8;
  --r:10px;--r2:6px;
}
body{font-family:'Nunito',sans-serif;background:var(--page);color:var(--txt);min-height:100vh}
h1,h2,h3{font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
header{background:linear-gradient(135deg,#0D47A1,#1976D2 60%,#0288D1);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:14px;box-shadow:0 3px 12px rgba(0,0,0,.25);position:sticky;top:0;z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900}.logo span{color:var(--sand)}
.hdr-sub{font-size:11px;opacity:.8;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.spacer{flex:1}
.hdr-btns{display:flex;gap:8px;align-items:center}
.save-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;transition:all .2s}
.save-btn:hover{background:rgba(255,255,255,.28)}
.tabs{display:flex;gap:3px;padding:12px 18px 0;border-bottom:2px solid var(--brd);background:#fff;position:sticky;top:58px;z-index:90;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow-x:auto}
.tab-btn{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.4px;padding:8px 18px;border:none;border-radius:var(--r) var(--r) 0 0;cursor:pointer;background:transparent;color:var(--txt2);border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn:hover{background:var(--ocean-pale);color:var(--ocean)}
.tab-btn.active{background:var(--ocean-pale);color:var(--ocean);border-bottom-color:var(--ocean)}
main{padding:18px;max-width:1600px;margin:0 auto}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--brd);overflow:hidden}
.card-hdr{padding:11px 14px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:.4px}
.card-body{padding:14px}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}
.standings{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px}
.standings th{background:var(--ocean-pale);color:var(--ocean);font-weight:700;padding:5px 7px;text-align:center;font-size:11px;text-transform:uppercase}
.standings th:first-child{text-align:left}
.standings td{padding:4px 7px;border-bottom:1px solid #ECEFF1;text-align:center}
.standings td:first-child{text-align:left;font-weight:600}
.standings tr:last-child td{border-bottom:none}
.standings tr:nth-child(even) td{background:#FAFAFA}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;font-size:10px;font-weight:800;margin-right:5px}
.r1{background:#FFD700;color:#5D4037}.r2{background:#C0C0C0;color:#37474F}.r3{background:#CD7F32;color:#fff}.r4{background:#ECEFF1;color:#607D8B}
.match-list{display:flex;flex-direction:column;gap:8px}
.match-card{border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden}
.match-hdr{background:#F5F7FA;padding:4px 9px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:3px}
.match-hdr .lbl{font-weight:700;font-size:11px;color:var(--txt2)}
.match-hdr .rule{font-size:10px;color:#90A4AE;font-style:italic}
.match-teams{padding:7px 9px;display:flex;flex-direction:column;gap:3px}
.team-row{display:flex;align-items:center;gap:7px}
.team-name{flex:1;font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.team-winner .team-name{color:var(--win)}
.set-pts{min-width:20px;text-align:center;font-weight:700;font-size:13px;color:var(--ocean)}
.match-sets{padding:5px 9px 7px;border-top:1px solid #ECEFF1;display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end}
.set-block{display:flex;flex-direction:column;gap:2px;min-width:88px}
.set-block label{font-size:9px;color:#90A4AE;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.set-row{display:flex;align-items:center;gap:3px}
.si{width:36px;height:27px;border:1px solid var(--brd);border-radius:4px;text-align:center;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--txt)}
.si:focus{outline:none;border-color:var(--ocean);box-shadow:0 0 0 2px var(--ocean-pale)}
.set-sep{font-weight:900;color:#90A4AE;font-size:13px}
.exp-lbl{display:flex;align-items:center;gap:3px;font-size:10px;color:#FF7043;font-weight:700;cursor:pointer;white-space:nowrap;margin-top:2px}
.exp-lbl input{width:12px;height:12px;accent-color:#FF7043;cursor:pointer}
.win-dot{width:7px;height:7px;border-radius:50%;background:transparent;flex-shrink:0}
.win-dot.on{background:var(--win)}
.setup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}
.team-input-list{display:flex;flex-direction:column;gap:7px}
.team-input-row{display:flex;align-items:center;gap:7px}
.tn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--txt2);min-width:22px;text-align:right}
.ti{flex:1;padding:6px 9px;border:1px solid var(--brd);border-radius:var(--r2);font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--txt)}
.ti:focus{outline:none;border-color:var(--ocean);box-shadow:0 0 0 2px var(--ocean-pale)}
/* bracket */
.bsec{margin-bottom:22px}
.bsec-hdr{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.bsec-hdr h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900}
.bdiv{flex:1;height:2px;border-radius:1px}
.wb-c{background:var(--wb)}.lb-c{background:var(--lb)}.gf-c{background:var(--gf)}
.b-rounds{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.b-col{min-width:172px;display:flex;flex-direction:column;gap:7px}
.b-col-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;text-align:center;padding:4px;border-radius:var(--r2);margin-bottom:3px}
.wb-lbl{background:var(--wb-bg);color:var(--wb)}.lb-lbl{background:var(--lb-bg);color:var(--lb)}.gf-lbl{background:var(--gf-bg);color:var(--gf)}
.bm-card{border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden;background:#fff}
.bm-hdr{padding:3px 7px;font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
.wb-bm .bm-hdr{background:var(--wb-bg);color:var(--wb)}.lb-bm .bm-hdr{background:var(--lb-bg);color:var(--lb)}.gf-bm .bm-hdr{background:var(--gf-bg);color:var(--gf)}
.bm-teams{padding:5px 7px;display:flex;flex-direction:column;gap:3px}
.bm-row{display:flex;align-items:center;gap:4px}
.bm-dot{width:6px;height:6px;border-radius:50%;background:#E0E0E0;flex-shrink:0}
.bm-dot.won{background:var(--win)}
.bm-name{flex:1;font-weight:700;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bm-tbd{color:#B0BEC5;font-style:italic;font-weight:400}
.bm-wins{font-size:11px;font-weight:800;color:var(--txt2);min-width:12px;text-align:center}
.bm-wins.won{color:var(--win)}
.bm-sets{padding:4px 7px 6px;border-top:1px solid #F0F0F0;display:flex;gap:5px;flex-wrap:wrap}
.bm-set{display:flex;align-items:center;gap:2px}
.bm-set span{font-size:9px;color:#90A4AE;font-weight:700}
.bm-si{width:28px;height:20px;border:1px solid var(--brd);border-radius:3px;text-align:center;font-size:11px;font-weight:700;font-family:'Nunito',sans-serif}
.bm-si:focus{outline:none;border-color:var(--ocean)}.bm-si:disabled{background:#F5F5F5;color:#B0BEC5}
.bm-sep{font-weight:900;color:#90A4AE;font-size:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border:none;border-radius:var(--r2);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.4px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--ocean);color:#fff}.btn-primary:hover{background:var(--ocean-l)}
.btn-sand{background:var(--sand);color:#5D4037}.btn-sand:hover{background:var(--sand-d);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
.action-bar{display:flex;gap:9px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.info-box{background:var(--sand-l);border:1px solid #FFE082;border-radius:var(--r2);padding:9px 13px;font-size:12px;color:#5D4037;margin-bottom:14px;line-height:1.6}
.info-box strong{color:#F57F17}
.seed-table{width:100%;border-collapse:collapse;font-size:12px}
.seed-table th{background:var(--ocean);color:#fff;padding:6px 9px;text-align:left;font-size:11px;text-transform:uppercase}
.seed-table td{padding:5px 9px;border-bottom:1px solid #ECEFF1}
.seed-table tr:last-child td{border-bottom:none}
.seed-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-weight:800;font-size:10px;background:var(--ocean-pale);color:var(--ocean)}
.winner-banner{background:linear-gradient(135deg,#2E7D32,#388E3C);color:#fff;border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:10px;margin-bottom:18px}
.winner-banner h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900}
/* Piano Partite */
.schedule-day{margin-bottom:20px}
.day-hdr{background:var(--ocean);color:#fff;border-radius:var(--r) var(--r) 0 0;padding:10px 16px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.day-hdr .day-info{font-size:12px;opacity:.8;font-weight:400;font-family:'Nunito',sans-serif}
.day-body{background:#fff;border:1px solid var(--brd);border-top:none;border-radius:0 0 var(--r) var(--r)}
.schedule-table{width:100%;border-collapse:collapse}
.schedule-table th{background:#F5F7FA;padding:7px 12px;font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--brd)}
.schedule-table td{padding:8px 12px;border-bottom:1px solid #F0F4F8;font-size:13px;vertical-align:top}
.schedule-table tr:last-child td{border-bottom:none}
.schedule-table tr:nth-child(even) td{background:#FAFBFC}
.slot-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--ocean)}
.field-match{font-weight:600}
.field-match .vs{color:var(--txt2);font-weight:400}
.match-type-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-bottom:2px;letter-spacing:.3px}
.wb-badge{background:var(--wb-bg);color:var(--wb)}
.lb-badge{background:var(--lb-bg);color:var(--lb)}
.gf-badge{background:var(--gf-bg);color:var(--gf)}
.g-badge{background:#E3F2FD;color:#0D47A1}
.dep-note{font-size:10px;color:#90A4AE;font-style:italic;margin-top:1px}
/* Print tab */
.print-wrap{background:#fff;border:1px solid var(--brd);border-radius:var(--r);overflow:hidden}
.print-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--brd)}
.print-bar h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900}
.legend-row{display:flex;gap:14px;padding:8px 18px;background:#FAFAFA;border-bottom:1px solid var(--brd);flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700}
.ld{width:11px;height:11px;border-radius:2px}
.svg-scroll{overflow-x:auto;padding:16px 10px}
@media print{
  header,.tabs,.print-bar,.legend-row,.action-bar,.info-box{display:none!important}
  body{background:#fff!important}
  main{padding:2px!important}
  .print-wrap{border:none!important}
  .svg-scroll{padding:0!important;overflow:visible!important}
}
</style>
</head>

</div>
<main id="mc"><div class="info-box"><strong>Inserisci i nomi delle 16 squadre</strong> (4 per girone). Poi vai su Gironi per i risultati e "Genera Tabellone".</div><div class="setup-grid"><div class="card"><div class="card-hdr" style="background:var(--ocean);color:#fff">🏐 Girone A</div><div class="card-body"><div class="team-input-list"><div class="team-input-row"><span class="tn">1.</span><input class="ti" type="text" maxlength="20" data-ti="0" value="Luca" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">2.</span><input class="ti" type="text" maxlength="20" data-ti="1" value="Pippo" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">3.</span><input class="ti" type="text" maxlength="20" data-ti="2" value="A3" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">4.</span><input class="ti" type="text" maxlength="20" data-ti="3" value="A4" placeholder="Nome squadra"></div></div></div></div><div class="card"><div class="card-hdr" style="background:var(--ocean);color:#fff">🏐 Girone B</div><div class="card-body"><div class="team-input-list"><div class="team-input-row"><span class="tn">1.</span><input class="ti" type="text" maxlength="20" data-ti="4" value="B1" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">2.</span><input class="ti" type="text" maxlength="20" data-ti="5" value="B2" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">3.</span><input class="ti" type="text" maxlength="20" data-ti="6" value="B3" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">4.</span><input class="ti" type="text" maxlength="20" data-ti="7" value="B4" placeholder="Nome squadra"></div></div></div></div><div class="card"><div class="card-hdr" style="background:var(--ocean);color:#fff">🏐 Girone C</div><div class="card-body"><div class="team-input-list"><div class="team-input-row"><span class="tn">1.</span><input class="ti" type="text" maxlength="20" data-ti="8" value="C1" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">2.</span><input class="ti" type="text" maxlength="20" data-ti="9" value="C2" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">3.</span><input class="ti" type="text" maxlength="20" data-ti="10" value="C3" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">4.</span><input class="ti" type="text" maxlength="20" data-ti="11" value="C4" placeholder="Nome squadra"></div></div></div></div><div class="card"><div class="card-hdr" style="background:var(--ocean);color:#fff">🏐 Girone D</div><div class="card-body"><div class="team-input-list"><div class="team-input-row"><span class="tn">1.</span><input class="ti" type="text" maxlength="20" data-ti="12" value="D1" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">2.</span><input class="ti" type="text" maxlength="20" data-ti="13" value="D2" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">3.</span><input class="ti" type="text" maxlength="20" data-ti="14" value="D3" placeholder="Nome squadra"></div><div class="team-input-row"><span class="tn">4.</span><input class="ti" type="text" maxlength="20" data-ti="15" value="D4" placeholder="Nome squadra"></div></div></div></div></div></main>

<script>
// ═══════════════════════ MATCH LABELS ═══════════════════
const ML={
  W1A:'WB R1 – partita 1',W1B:'WB R1 – partita 2',W1C:'WB R1 – partita 3',W1D:'WB R1 – partita 4',
  W1E:'WB R1 – partita 5',W1F:'WB R1 – partita 6',W1G:'WB R1 – partita 7',W1H:'WB R1 – partita 8',
  W2A:'WB R2 – partita 1',W2B:'WB R2 – partita 2',W2C:'WB R2 – partita 3',W2D:'WB R2 – partita 4',
  WSA:'WB Semifinale 1',WSB:'WB Semifinale 2',WF:'WB Finale',
  L1A:'LB R1 – partita 1',L1B:'LB R1 – partita 2',L1C:'LB R1 – partita 3',L1D:'LB R1 – partita 4',
  L2A:'LB R2 – partita 1',L2B:'LB R2 – partita 2',L2C:'LB R2 – partita 3',L2D:'LB R2 – partita 4',
  L3A:'LB R3 – partita 1',L3B:'LB R3 – partita 2',
  L4A:'LB R4 – partita 1',L4B:'LB R4 – partita 2',
  LSF:'LB Semifinale',LF:'LB Finale',GF1:'Grand Finale',GF2:'Bella (se necessario)',
};

// ═══════════════════════ DATA ═══════════════════════════
const GROUPS=['A','B','C','D'];
const PAIRS=[[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
const GROUP_MATCHES=[];
GROUPS.forEach((g,gi)=>{const b=gi*4;PAIRS.forEach(([a,b2],mi)=>{GROUP_MATCHES.push({id:`G${g}M${mi}`,group:g,t1:b+a,t2:b+b2,num:mi+1});});});

const BRACKET_DEF=[
  {id:'W1A',lbl:ML.W1A,type:'wb',t1:{s:0},  t2:{s:15}},
  {id:'W1B',lbl:ML.W1B,type:'wb',t1:{s:7},  t2:{s:8}},
  {id:'W1C',lbl:ML.W1C,type:'wb',t1:{s:4},  t2:{s:11}},
  {id:'W1D',lbl:ML.W1D,type:'wb',t1:{s:3},  t2:{s:12}},
  {id:'W1E',lbl:ML.W1E,type:'wb',t1:{s:2},  t2:{s:13}},
  {id:'W1F',lbl:ML.W1F,type:'wb',t1:{s:5},  t2:{s:10}},
  {id:'W1G',lbl:ML.W1G,type:'wb',t1:{s:6},  t2:{s:9}},
  {id:'W1H',lbl:ML.W1H,type:'wb',t1:{s:1},  t2:{s:14}},
  {id:'W2A',lbl:ML.W2A,type:'wb',t1:{w:'W1A'},t2:{w:'W1B'}},
  {id:'W2B',lbl:ML.W2B,type:'wb',t1:{w:'W1C'},t2:{w:'W1D'}},
  {id:'W2C',lbl:ML.W2C,type:'wb',t1:{w:'W1E'},t2:{w:'W1F'}},
  {id:'W2D',lbl:ML.W2D,type:'wb',t1:{w:'W1G'},t2:{w:'W1H'}},
  {id:'WSA',lbl:ML.WSA,type:'wb',t1:{w:'W2A'},t2:{w:'W2B'}},
  {id:'WSB',lbl:ML.WSB,type:'wb',t1:{w:'W2C'},t2:{w:'W2D'}},
  {id:'WF', lbl:ML.WF, type:'wb',t1:{w:'WSA'},t2:{w:'WSB'}},
  {id:'L1A',lbl:ML.L1A,type:'lb',t1:{l:'W1A'},t2:{l:'W1B'}},
  {id:'L1B',lbl:ML.L1B,type:'lb',t1:{l:'W1C'},t2:{l:'W1D'}},
  {id:'L1C',lbl:ML.L1C,type:'lb',t1:{l:'W1E'},t2:{l:'W1F'}},
  {id:'L1D',lbl:ML.L1D,type:'lb',t1:{l:'W1G'},t2:{l:'W1H'}},
  {id:'L2A',lbl:ML.L2A,type:'lb',t1:{w:'L1A'},t2:{l:'W2D'}},
  {id:'L2B',lbl:ML.L2B,type:'lb',t1:{w:'L1B'},t2:{l:'W2C'}},
  {id:'L2C',lbl:ML.L2C,type:'lb',t1:{w:'L1C'},t2:{l:'W2B'}},
  {id:'L2D',lbl:ML.L2D,type:'lb',t1:{w:'L1D'},t2:{l:'W2A'}},
  {id:'L3A',lbl:ML.L3A,type:'lb',t1:{w:'L2A'},t2:{w:'L2B'}},
  {id:'L3B',lbl:ML.L3B,type:'lb',t1:{w:'L2C'},t2:{w:'L2D'}},
  {id:'L4A',lbl:ML.L4A,type:'lb',t1:{l:'WSA'},t2:{w:'L3A'}},
  {id:'L4B',lbl:ML.L4B,type:'lb',t1:{l:'WSB'},t2:{w:'L3B'}},
  {id:'LSF',lbl:ML.LSF,type:'lb',t1:{w:'L4A'},t2:{w:'L4B'}},
  {id:'LF', lbl:ML.LF, type:'lb',t1:{l:'WF'}, t2:{w:'LSF'}},
  {id:'GF1',lbl:ML.GF1,type:'gf',t1:{w:'WF'}, t2:{w:'LF'}},
  {id:'GF2',lbl:ML.GF2,type:'gf',t1:{l:'GF1'},t2:{w:'GF1'}},
];
const BMAP={};BRACKET_DEF.forEach(m=>BMAP[m.id]=m);

const WB_ROUNDS=[
  {lbl:'WB Round 1',ids:['W1A','W1B','W1C','W1D','W1E','W1F','W1G','W1H']},
  {lbl:'WB Round 2',ids:['W2A','W2B','W2C','W2D']},
  {lbl:'WB Semifinali',ids:['WSA','WSB']},
  {lbl:'WB Finale',ids:['WF']},
];
const LB_ROUNDS=[
  {lbl:'LB Round 1',ids:['L1A','L1B','L1C','L1D']},
  {lbl:'LB Round 2',ids:['L2A','L2B','L2C','L2D']},
  {lbl:'LB Round 3',ids:['L3A','L3B']},
  {lbl:'LB Round 4',ids:['L4A','L4B']},
  {lbl:'LB Semifin.',ids:['LSF']},
  {lbl:'LB Finale',ids:['LF']},
];
const GF_ROUNDS=[{lbl:'Grand Finale',ids:['GF1','GF2']}];

// ═══════════════════════ STATE ══════════════════════════
const state={
  tab:'squadre',
  teams:Array(16).fill(0).map((_,i)=>`${GROUPS[Math.floor(i/4)]}${(i%4)+1}`),
  groupMatches:{},bracketMatches:{},
  seeds:[],seedsInfo:[],seedsLocked:false,
  pwdHash:null,
};
GROUP_MATCHES.forEach(m=>{state.groupMatches[m.id]={sets:[{s1:'',s2:'',exp:false},{s1:'',s2:'',exp:false},{s1:'',s2:'',exp:false}]};});
BRACKET_DEF.forEach(m=>{state.bracketMatches[m.id]={sets:[{s1:'',s2:''},{s1:'',s2:''},{s1:'',s2:''}]};});

function restoreState(sv){
  ['teams','groupMatches','bracketMatches','seeds','seedsInfo','seedsLocked','pwdHash','tab'].forEach(k=>{
    if(sv[k]!==undefined)state[k]=sv[k];
  });
}

// ═══════════════════════ SCORING ════════════════════════
function isSetDone(s1,s2){
  if(s1===''||s2===''||s1===null||s2===null)return false;
  const a=+s1,b=+s2;if(isNaN(a)||isNaN(b))return false;
  return(a>=15&&a-b>=2)||(b>=15&&b-a>=2);
}
function groupSetScore(s1,s2,exp){
  if(s1===''||s2===''||s1===null||s2===null)return[0,0,0,0];
  const a=+s1,b=+s2;if(isNaN(a)||isNaN(b))return[0,0,0,0];
  if(!exp){if(a>=15&&a-b>=2)return[2,0,1,0];if(b>=15&&b-a>=2)return[0,2,0,1];return[0,0,0,0];}
  if(a>b)return[1,0,1,0];if(b>a)return[0,1,0,1];return[0,0,0,0];
}
function getGroupStandings(gId){
  const gi=GROUPS.indexOf(gId),base=gi*4,stats={};
  for(let i=0;i<4;i++)stats[base+i]={ti:base+i,pts:0,sw:0,sl:0,pf:0,pa:0};
  GROUP_MATCHES.filter(m=>m.group===gId).forEach(mdef=>{
    state.groupMatches[mdef.id].sets.forEach(set=>{
      const[p1,p2,sw1,sw2]=groupSetScore(set.s1,set.s2,set.exp);
      stats[mdef.t1].pts+=p1;stats[mdef.t2].pts+=p2;
      stats[mdef.t1].sw+=sw1;stats[mdef.t2].sw+=sw2;
      stats[mdef.t1].sl+=sw2;stats[mdef.t2].sl+=sw1;
      const a=+set.s1||0,b=+set.s2||0;
      stats[mdef.t1].pf+=a;stats[mdef.t1].pa+=b;
      stats[mdef.t2].pf+=b;stats[mdef.t2].pa+=a;
    });
  });
  return Object.values(stats).sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const ad=a.sw-a.sl,bd=b.sw-b.sl;if(bd!==ad)return bd-ad;
    return(b.pf-b.pa)-(a.pf-a.pa);
  });
}
function computeSeeds(){
  const r={};GROUPS.forEach(g=>{r[g]=getGroupStandings(g);});
  const seeds=[],seedsInfo=[];
  for(let pos=0;pos<4;pos++)GROUPS.forEach(g=>{
    seeds.push(r[g][pos].ti);
    seedsInfo.push({ti:r[g][pos].ti,group:g,rank:pos+1});
  });
  return{seeds,seedsInfo};
}

// ═══════════════════════ BRACKET ════════════════════════
function bTeam(src){
  if(!src)return null;
  if(src.s!==undefined)return state.seeds[src.s]!==undefined?state.seeds[src.s]:null;
  const r=src.w?bResult(src.w):bResult(src.l);
  return r?(src.w?r.winner:r.loser):null;
}
function bResult(mid){
  const ms=state.bracketMatches[mid],mdef=BMAP[mid];
  const t1=bTeam(mdef.t1),t2=bTeam(mdef.t2);
  if(t1===null||t2===null)return null;
  let w1=0,w2=0;
  ms.sets.forEach(s=>{if(isSetDone(s.s1,s.s2))(+s.s1>+s.s2?w1++:w2++);});
  if(w1>=2)return{winner:t1,loser:t2};if(w2>=2)return{winner:t2,loser:t1};return null;
}
function bWinner(mid){const r=bResult(mid);return r?r.winner:null;}
function tn(ti){return ti===null||ti===undefined?'???':state.teams[ti]||`Sq.${ti+1}`;}
function srcLbl(src){
  if(!src)return'TBD';
  if(src.s!==undefined){const ti=state.seeds[src.s];return ti!==undefined?tn(ti):`Testa #${src.s+1}`;}
  const mid=src.w||src.l,r=bResult(mid);
  if(r)return src.w?tn(r.winner):tn(r.loser);
  return src.w?`Vin. ${ML[mid]||mid}`:`Sconf. ${ML[mid]||mid}`;
}

// ═══════════════════════ TABS ═══════════════════════════
function setTab(tab){
  state.tab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes(`'${tab}'`)));
  renderMain();
}
function renderMain(){
  const el=document.getElementById('mc');
  const m={squadre:rSquadre,gironi:rGironi,tabellone:rTabellone,piano:rPiano,stampa:rPrint};
  el.innerHTML=(m[state.tab]||rSquadre)();
  attachHandlers();
}

// ═══════════════════════ SQUADRE ════════════════════════
function rSquadre(){
  const groups=GROUPS.map((g,gi)=>{
    const base=gi*4;
    const rows=[0,1,2,3].map(i=>`<div class="team-input-row"><span class="tn">${i+1}.</span><input class="ti" type="text" maxlength="20" data-ti="${base+i}" value="${esc(state.teams[base+i])}" placeholder="Nome squadra"></div>`).join('');
    return`<div class="card"><div class="card-hdr" style="background:var(--ocean);color:#fff">🏐 Girone ${g}</div><div class="card-body"><div class="team-input-list">${rows}</div></div></div>`;
  }).join('');
  return`<div class="info-box"><strong>Inserisci i nomi delle 16 squadre</strong> (4 per girone). Poi vai su Gironi per i risultati e "Genera Tabellone".</div><div class="setup-grid">${groups}</div>`;
}

// ═══════════════════════ GIRONI ═════════════════════════
function rGironi(){
  const groups=GROUPS.map(g=>{
    const standings=getGroupStandings(g);
    const stRows=standings.map((s,rank)=>{
      const bc=['r1','r2','r3','r4'][rank];
      return`<tr><td><span class="rank-badge ${bc}">${rank+1}</span>${esc(tn(s.ti))}</td><td><strong>${s.pts}</strong></td><td>${s.sw}</td><td>${s.sl}</td><td>${s.sw-s.sl>0?'+':''}${s.sw-s.sl}</td><td>${s.pf}</td><td>${s.pa}</td><td>${rank<2?'✅':'❌'}</td></tr>`;
    }).join('');
    const matches=GROUP_MATCHES.filter(m=>m.group===g).map((mdef,idx)=>{
      const ms=state.groupMatches[mdef.id];
      const t1n=esc(tn(mdef.t1)),t2n=esc(tn(mdef.t2));
      let tp1=0,tp2=0;
      ms.sets.forEach(s=>{const[p1,p2]=groupSetScore(s.s1,s.s2,s.exp);tp1+=p1;tp2+=p2;});
      const w1=tp1>tp2,w2=tp2>tp1;
      const sets=ms.sets.map((set,si)=>`<div class="set-block"><label>Set ${si+1}</label><div class="set-row"><input class="si" type="number" min="0" max="30" data-gm="${mdef.id}" data-si="${si}" data-wh="s1" value="${set.s1}"><span class="set-sep">–</span><input class="si" type="number" min="0" max="30" data-gm="${mdef.id}" data-si="${si}" data-wh="s2" value="${set.s2}"></div><label class="exp-lbl"><input type="checkbox" data-gm="${mdef.id}" data-si="${si}" data-wh="exp" ${set.exp?'checked':''}>⏰ Tempo</label></div>`).join('');
      return`<div class="match-card"><div class="match-hdr"><span class="lbl">P${idx+1}: ${t1n} vs ${t2n}</span><span class="rule">⏱ 20min | 2pt vinto | 1pt a tempo</span></div><div class="match-teams"><div class="team-row ${w1?'team-winner':''}"><div class="win-dot ${w1?'on':''}"></div><span class="team-name">${t1n}</span><span class="set-pts">${tp1}</span></div><div class="team-row ${w2?'team-winner':''}"><div class="win-dot ${w2?'on':''}"></div><span class="team-name">${t2n}</span><span class="set-pts">${tp2}</span></div></div><div class="match-sets">${sets}</div></div>`;
    }).join('');
    return`<div class="card"><div class="card-hdr" style="background:var(--ocean);color:#fff">📋 Girone ${g}</div><div class="card-body"><table class="standings"><thead><tr><th style="text-align:left">Squadra</th><th>Pt</th><th>SW</th><th>SL</th><th>±S</th><th>PF</th><th>PA</th><th>→</th></tr></thead><tbody>${stRows}</tbody></table><div class="match-list">${matches}</div></div></div>`;
  }).join('');
  return`<div class="action-bar"><button class="btn btn-sand" onclick="doGenSeeds()">🎯 Genera Tabellone</button><span style="font-size:11px;color:var(--txt2)">${state.seedsLocked?'✅ Tabellone generato':'Completa i gironi poi genera il tabellone'}</span></div><div class="info-box"><strong>Gironi:</strong> 3 set disponibili, 20 min totali. Set ai 15 pt + 2 di vantaggio. <strong>Set vinto → 2 pt</strong>. Set a tempo in vantaggio → <strong>1 pt</strong>. Classifica: Punti → Diff. Set → Diff. Punti.</div><div class="groups-grid">${groups}</div>`;
}

// ═══════════════════════ TABELLONE ══════════════════════
function rTabellone(){
  if(!state.seedsLocked)return`<div class="card" style="text-align:center;padding:40px"><div style="font-size:44px;margin-bottom:10px">🏆</div><h2 style="font-size:22px;margin-bottom:8px">Tabellone non generato</h2><p style="color:var(--txt2);margin-bottom:18px">Completa i gironi e clicca "Genera Tabellone".</p><button class="btn btn-primary" onclick="setTab('gironi')">Vai ai Gironi →</button></div>`;
  const gf1r=bResult('GF1'),gf2r=bResult('GF2');
  let winner=null;
  if(gf2r)winner=gf2r.winner;
  else if(gf1r&&gf1r.winner===bWinner('WF'))winner=gf1r.winner;
  const wb=winner?`<div class="winner-banner"><div style="font-size:32px">🏆</div><div><div style="font-size:12px;opacity:.85;font-weight:700;letter-spacing:1px">CAMPIONE DEL TORNEO</div><h2>${esc(tn(winner))}</h2></div></div>`:'';
  const sRows=state.seeds.map((ti,i)=>{
    const inf=state.seedsInfo[i];
    return`<tr><td><span class="seed-badge">${i+1}</span></td><td><strong>${esc(tn(ti))}</strong></td><td style="color:var(--txt2);font-size:11px">${inf?`Girone ${inf.group} · ${inf.rank}° posto`:''}</td></tr>`;
  }).join('');
  const wb_html=rBSec(WB_ROUNDS,'wb');
  const lb_html=rBSec(LB_ROUNDS,'lb');
  const gf_html=rBSec(GF_ROUNDS,'gf');
  return`${wb}<div class="action-bar"><button class="btn btn-sand btn-sm" onclick="doGenSeeds()">🔄 Rigenera</button><span style="font-size:11px;color:var(--txt2)">Doppia eliminazione · Best of 3 · 15 pt</span></div><div style="display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start;margin-bottom:18px"><div class="info-box" style="margin:0"><strong>Doppia eliminazione:</strong> fuori dopo 2 sconfitte. WB = nessuna sconfitta. LB = 1 sconfitta. Grand Finale: vin. WB vs vin. LB. Se vince LB si gioca la Bella.</div><div class="card"><div class="card-hdr" style="background:var(--ocean);color:#fff;font-size:13px">🎯 Teste di serie</div><table class="seed-table"><tbody>${sRows}</tbody></table></div></div><div class="bsec"><div class="bsec-hdr"><h3 style="color:var(--wb)">🏅 Winners Bracket</h3><div class="bdiv wb-c"></div></div><div class="b-rounds">${wb_html}</div></div><div class="bsec"><div class="bsec-hdr"><h3 style="color:var(--lb)">💀 Losers Bracket</h3><div class="bdiv lb-c"></div></div><div class="b-rounds">${lb_html}</div></div><div class="bsec"><div class="bsec-hdr"><h3 style="color:var(--gf)">🏆 Grand Finale</h3><div class="bdiv gf-c"></div></div><div class="b-rounds">${gf_html}</div></div>`;
}
function rBSec(rounds,type){
  return rounds.map(r=>{
    const cards=r.ids.map(id=>rBMatch(id)).join('');
    return`<div class="b-col"><div class="b-col-lbl ${type}-lbl">${r.lbl}</div>${cards}</div>`;
  }).join('');
}
function rBMatch(mid){
  const mdef=BMAP[mid],ms=state.bracketMatches[mid];
  const t1=bTeam(mdef.t1),t2=bTeam(mdef.t2);
  const res=bResult(mid);
  let sw1=0,sw2=0;
  ms.sets.forEach(s=>{if(isSetDone(s.s1,s.s2))(+s.s1>+s.s2?sw1++:sw2++);});
  const w1=res&&res.winner===t1,w2=res&&res.winner===t2;
  const show3=sw1===1&&sw2===1;
  const sets=ms.sets.map((set,si)=>{
    if(si===2&&!show3&&set.s1===''&&set.s2==='')return'';
    const locked=(w1||w2)&&!isSetDone(set.s1,set.s2);
    return`<div class="bm-set"><span>S${si+1}</span><input class="bm-si" type="number" min="0" max="30" data-bm="${mid}" data-si="${si}" data-w="s1" value="${set.s1}" ${locked?'disabled':''}><span class="bm-sep">–</span><input class="bm-si" type="number" min="0" max="30" data-bm="${mid}" data-si="${si}" data-w="s2" value="${set.s2}" ${locked?'disabled':''}></div>`;
  }).join('');
  return`<div class="bm-card ${mdef.type}-bm"><div class="bm-hdr">${mdef.lbl}</div><div class="bm-teams"><div class="bm-row"><div class="bm-dot ${w1?'won':''}"></div><div class="bm-name ${t1===null?'bm-tbd':''}">${t1!==null?esc(tn(t1)):esc(srcLbl(mdef.t1))}</div><div class="bm-wins ${w1?'won':''}">${sw1||''}</div></div><div class="bm-row"><div class="bm-dot ${w2?'won':''}"></div><div class="bm-name ${t2===null?'bm-tbd':''}">${t2!==null?esc(tn(t2)):esc(srcLbl(mdef.t2))}</div><div class="bm-wins ${w2?'won':''}">${sw2||''}</div></div></div><div class="bm-sets">${sets}</div></div>`;
}

function rPiano(){
  const days=buildSchedule();
  const html=days.map(day=>{
    const slots=day.slots.map((slot,si)=>{
      const c1=slotCell(slot.f1);
      const c2=slotCell(slot.f2);
      return`<tr><td class="slot-num">${si+1}</td><td>${c1}</td><td>${c2}</td></tr>`;
    }).join('');
    return`<div class="schedule-day"><div class="day-hdr"><span>${day.title}</span><span class="day-info">${day.matches} partite</span></div><div class="day-body"><table class="schedule-table"><thead><tr><th style="width:36px">#</th><th>Campo 1</th><th>Campo 2</th></tr></thead><tbody>${slots}</tbody></table></div></div>`;
  }).join('');
  return`<div class="info-box"><strong>Ottimizzazione:</strong> Gironi A+B nella giornata 1, C+D nella giornata 2 → ogni squadra gioca tutte e 3 le partite di girone nello stesso giorno. Fasi finali compresse in 4 giornate (max 12 partite/giorno su 2 campi).</div>${html}`;
}
function slotCell(slot){
  if(!slot)return`<span style="color:#CFD8DC;font-style:italic">—</span>`;
  if(slot.type==='group'){
    const t1n=esc(tn(slot.t1)),t2n=esc(tn(slot.t2));
    return`<div><span class="match-type-badge g-badge">Girone ${slot.group}</span><div class="field-match">${t1n} <span class="vs">vs</span> ${t2n}</div></div>`;
  }
  if(slot.type==='bracket'){
    const mdef=BMAP[slot.mid];
    const t1=bTeam(mdef.t1),t2=bTeam(mdef.t2);
    const n1=t1!==null?esc(tn(t1)):esc(srcLbl(mdef.t1));
    const n2=t2!==null?esc(tn(t2)):esc(srcLbl(mdef.t2));
    const badgeClass=slot.btype+'-badge';
    const shortLbl=slot.slbl||ML[slot.mid]||slot.mid;
    return`<div><span class="match-type-badge ${badgeClass}">${shortLbl}</span><div class="field-match">${n1} <span class="vs">vs</span> ${n2}</div>${slot.dep?`<div class="dep-note">⚠ dopo ${slot.dep}</div>`:''}</div>`;
  }
  return'';
}
function mkBSlot(mid,btype,slbl,dep){return{type:'bracket',mid,btype,slbl,dep};}
function buildSchedule(){
  const days=[];
  // Day 1: Gironi A + B
  const GA=GROUP_MATCHES.filter(m=>m.group==='A');
  const GB=GROUP_MATCHES.filter(m=>m.group==='B');
  const day1={title:'Giornata 1 – Gironi A e B',matches:12,slots:[]};
  for(let i=0;i<6;i++)day1.slots.push({
    f1:{type:'group',group:'A',t1:GA[i].t1,t2:GA[i].t2},
    f2:{type:'group',group:'B',t1:GB[i].t1,t2:GB[i].t2},
  });
  days.push(day1);
  // Day 2: Gironi C + D
  const GC=GROUP_MATCHES.filter(m=>m.group==='C');
  const GD=GROUP_MATCHES.filter(m=>m.group==='D');
  const day2={title:'Giornata 2 – Gironi C e D',matches:12,slots:[]};
  for(let i=0;i<6;i++)day2.slots.push({
    f1:{type:'group',group:'C',t1:GC[i].t1,t2:GC[i].t2},
    f2:{type:'group',group:'D',t1:GD[i].t1,t2:GD[i].t2},
  });
  days.push(day2);
  // Day 3: WB R1 (8) + LB R1 (4) = 12 partite
  days.push({title:'Giornata 3 – WB Round 1 + LB Round 1',matches:12,slots:[
    {f1:mkBSlot('W1A','wb','WB R1-1'),f2:mkBSlot('W1B','wb','WB R1-2')},
    {f1:mkBSlot('W1C','wb','WB R1-3'),f2:mkBSlot('W1D','wb','WB R1-4')},
    {f1:mkBSlot('W1E','wb','WB R1-5'),f2:mkBSlot('W1F','wb','WB R1-6')},
    {f1:mkBSlot('W1G','wb','WB R1-7'),f2:mkBSlot('W1H','wb','WB R1-8')},
    {f1:mkBSlot('L1A','lb','LB R1-1','WB R1 terminato'),f2:mkBSlot('L1B','lb','LB R1-2','WB R1 terminato')},
    {f1:mkBSlot('L1C','lb','LB R1-3','WB R1 terminato'),f2:mkBSlot('L1D','lb','LB R1-4','WB R1 terminato')},
  ]});
  // Day 4: WB R2 (4) + LB R2 (4) + LB R3 (2) = 10 partite
  days.push({title:'Giornata 4 – WB R2 + LB R2 + LB R3',matches:10,slots:[
    {f1:mkBSlot('W2A','wb','WB R2-1'),f2:mkBSlot('W2B','wb','WB R2-2')},
    {f1:mkBSlot('W2C','wb','WB R2-3'),f2:mkBSlot('W2D','wb','WB R2-4')},
    {f1:mkBSlot('L2A','lb','LB R2-1','WB R2 terminato'),f2:mkBSlot('L2B','lb','LB R2-2','WB R2 terminato')},
    {f1:mkBSlot('L2C','lb','LB R2-3','WB R2 terminato'),f2:mkBSlot('L2D','lb','LB R2-4','WB R2 terminato')},
    {f1:mkBSlot('L3A','lb','LB R3-1','LB R2 terminato'),f2:mkBSlot('L3B','lb','LB R3-2','LB R2 terminato')},
  ]});
  // Day 5: WB SF (2) + LB R4 (2) + LB SF (1) = 5 partite
  days.push({title:'Giornata 5 – WB Semifinali + LB R4 + LB Semifinale',matches:5,slots:[
    {f1:mkBSlot('WSA','wb','WB SF-1'),f2:mkBSlot('WSB','wb','WB SF-2')},
    {f1:mkBSlot('L4A','lb','LB R4-1','WB SF terminato'),f2:mkBSlot('L4B','lb','LB R4-2','WB SF terminato')},
    {f1:mkBSlot('LSF','lb','LB Semifinale','LB R4 terminato'),f2:null},
  ]});
  // Day 6: WB Final + LB Final + GF1 + GF2 = 3-4 partite
  days.push({title:'Giornata 6 – Finali',matches:'3 (+1 bella)',slots:[
    {f1:mkBSlot('WF','wb','WB Finale'),f2:null},
    {f1:mkBSlot('LF','lb','LB Finale','WB Finale terminato'),f2:null},
    {f1:mkBSlot('GF1','gf','Grand Finale','LB Finale terminato'),f2:null},
    {f1:mkBSlot('GF2','gf','Bella (se necessario)','Grand Finale – solo se vince LB'),f2:null},
  ]});
  return days;
}

function rPrint(){
  if(!state.seedsLocked)return`<div class="card" style="text-align:center;padding:40px"><div style="font-size:44px;margin-bottom:10px">🖨️</div><h2 style="font-size:20px;margin-bottom:8px">Genera prima il Tabellone</h2><p style="color:var(--txt2);margin-bottom:18px">Vai ai Gironi e clicca "Genera Tabellone".</p><button class="btn btn-primary" onclick="setTab('gironi')">Vai ai Gironi →</button></div>`;
  return`<div class="print-wrap"><div class="print-bar"><div><h2>Tabellone – Vista Stampa (A3 orizzontale)</h2><div style="font-size:11px;color:var(--txt2);margin-top:2px">Linee continue = percorso vincitori · Linee tratteggiate = perdenti che passano al LB</div></div><button class="btn btn-primary btn-sm" onclick="doPrint()">🖨️ Stampa / PDF</button></div><div class="legend-row"><div class="li"><div class="ld" style="background:#1565C0"></div>Winners Bracket</div><div class="li"><div class="ld" style="background:#B71C1C"></div>Losers Bracket</div><div class="li"><div class="ld" style="background:#2E7D32"></div>Grand Finale</div><div class="li"><div class="ld" style="background:#B71C1C;opacity:.5;border:1px dashed #B71C1C"></div>Feed perdenti WB → LB</div></div><div class="svg-scroll">${buildSVG()}</div></div>`;

function buildSVG(){
  const BW=152,BH=50,R=4;
  // ── Box positions [x,y] ──────────────────────────────
  // WB (columns: x=10,200,390,580; row spacing=110)
  const P={
    W1A:[10,10],W1B:[10,120],W1C:[10,230],W1D:[10,340],
    W1E:[10,450],W1F:[10,560],W1G:[10,670],W1H:[10,780],
    W2A:[200,65],W2B:[200,285],W2C:[200,505],W2D:[200,725],
    WSA:[390,175],WSB:[390,615],
    WF:[580,395],
    // LB rows start at y=950, spacing=200
    L1A:[10,950],L1B:[10,1150],L1C:[10,1350],L1D:[10,1550],
    // LB R2 same y as R1 (connected by winner)
    L2A:[200,950],L2B:[200,1150],L2C:[200,1350],L2D:[200,1550],
    // LB R3 centered between R2 pairs
    L3A:[390,1050],L3B:[390,1450],
    // LB R4 same y as R3
    L4A:[580,1050],L4B:[580,1450],
    // LB SF centered between R4 pair
    LSF:[770,1250],
    // LB Final same y as SF
    LF:[960,1250],
    // GF: vertically between WF and LF
    GF1:[1150,825],GF2:[1340,825],
  };
  const cx=id=>P[id][0]+BW/2, cy=id=>P[id][1]+BH/2;
  const rx=id=>P[id][0]+BW,   lx=id=>P[id][0];
  const slot1y=id=>P[id][1]+BH*0.28;
  const slot2y=id=>P[id][1]+BH*0.72;

  // ── Connection line drawer ────────────────────────────
  // srcId exits from right-center, enters dstId at slotY (1=top,2=bot)
  function conn(srcId,dstId,slot,stroke,dashed,opacity){
    const x1=rx(srcId),y1=cy(srcId);
    const x2=lx(dstId),y2=slot===1?slot1y(dstId):slot2y(dstId);
    const mx=(x1+x2)/2;
    const d=`M${x1},${y1} H${mx} V${y2} H${x2}`;
    return`<path d="${d}" fill="none" stroke="${stroke}" stroke-width="1.5" opacity="${opacity}" ${dashed?'stroke-dasharray="5,4"':''}/>`;
  }
  // Vertical join between two source lines at mid_x
  function vjoin(src1Id,src2Id,dstId,stroke){
    const mx=(rx(src1Id)+lx(dstId))/2;
    const y1=cy(src1Id),y2=cy(src2Id);
    return`<line x1="${mx}" y1="${y1}" x2="${mx}" y2="${y2}" stroke="${stroke}" stroke-width="1.5" opacity="0.7"/>`;
  }

  const WBC='#1565C0',LBC='#B71C1C',GFC='#2E7D32',CROSS='#C62828';

  // ── WB within-section lines ──────────────────────────
  const wbLines=[
    conn('W1A','W2A',1,WBC,false,.7),conn('W1B','W2A',2,WBC,false,.7),vjoin('W1A','W1B','W2A',WBC),
    conn('W1C','W2B',1,WBC,false,.7),conn('W1D','W2B',2,WBC,false,.7),vjoin('W1C','W1D','W2B',WBC),
    conn('W1E','W2C',1,WBC,false,.7),conn('W1F','W2C',2,WBC,false,.7),vjoin('W1E','W1F','W2C',WBC),
    conn('W1G','W2D',1,WBC,false,.7),conn('W1H','W2D',2,WBC,false,.7),vjoin('W1G','W1H','W2D',WBC),
    conn('W2A','WSA',1,WBC,false,.7),conn('W2B','WSA',2,WBC,false,.7),vjoin('W2A','W2B','WSA',WBC),
    conn('W2C','WSB',1,WBC,false,.7),conn('W2D','WSB',2,WBC,false,.7),vjoin('W2C','W2D','WSB',WBC),
    conn('WSA','WF',1,WBC,false,.7),conn('WSB','WF',2,WBC,false,.7),vjoin('WSA','WSB','WF',WBC),
  ].join('');

  // ── LB within-section lines ──────────────────────────
  const lbLines=[
    // R1→R2 (direct horizontal, winner goes to slot1 of R2)
    conn('L1A','L2A',1,LBC,false,.7),
    conn('L1B','L2B',1,LBC,false,.7),
    conn('L1C','L2C',1,LBC,false,.7),
    conn('L1D','L2D',1,LBC,false,.7),
    // R2→R3
    conn('L2A','L3A',1,LBC,false,.7),conn('L2B','L3A',2,LBC,false,.7),vjoin('L2A','L2B','L3A',LBC),
    conn('L2C','L3B',1,LBC,false,.7),conn('L2D','L3B',2,LBC,false,.7),vjoin('L2C','L2D','L3B',LBC),
    // R3→R4 (slot2 since slot1 is WB SF loser)
    conn('L3A','L4A',2,LBC,false,.7),
    conn('L3B','L4B',2,LBC,false,.7),
    // R4→SF
    conn('L4A','LSF',1,LBC,false,.7),conn('L4B','LSF',2,LBC,false,.7),vjoin('L4A','L4B','LSF',LBC),
    // SF→LF (slot2, slot1 is WF loser)
    conn('LSF','LF',2,LBC,false,.7),
  ].join('');

  // ── GF lines ─────────────────────────────────────────
  const gfLines=[
    conn('WF','GF1',1,GFC,false,.8),
    conn('LF','GF1',2,GFC,false,.8),vjoin('WF','LF','GF1',GFC),
    conn('GF1','GF2',1,GFC,false,.8),conn('GF1','GF2',2,GFC,false,.8),
  ].join('');

  // ── WB→LB cross-feed dashed lines ────────────────────
  // Each loser from WB R1 goes to a specific LB R1 match
  // Routed through a vertical corridor BETWEEN the two sections
  // to avoid overlap. Each line gets a unique x-routing offset.
  function crossFeed(srcId,dstId,dstSlot,xOff){
    const x1=rx(srcId),y1=cy(srcId);
    const x2=lx(dstId),yD=dstSlot===1?slot1y(dstId):slot2y(dstId);
    // Route: right from src → up/down in dedicated column at xOff → left to dst
    const routeX=P[srcId][0]-28-xOff*10; // route left of the section, before x=10
    return`<path d="M${x1},${y1} H${routeX} V${yD} H${x2}" fill="none" stroke="${CROSS}" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.4"/>`;
  }
  // WB R1 losers feed LB R1 (pairs: W1A+W1B→L1A, W1C+W1D→L1B, W1E+W1F→L1C, W1G+W1H→L1D)
  // Route them through separate x-corridors to the LEFT of x=10
  // W1A loser → L1A slot1; W1B loser → L1A slot2
  // etc.
  // Because LB is directly below WB, routing LEFT of the section keeps lines separate
  const crossLines=[
    crossFeed('W1A','L1A',1,0),crossFeed('W1B','L1A',2,1),
    crossFeed('W1C','L1B',1,2),crossFeed('W1D','L1B',2,3),
    crossFeed('W1E','L1C',1,4),crossFeed('W1F','L1C',2,5),
    crossFeed('W1G','L1D',1,6),crossFeed('W1H','L1D',2,7),
  ].join('');

  // WB R2 losers feed LB R2 (W2D→L2A slot2, W2C→L2B slot2, W2B→L2C slot2, W2A→L2D slot2)
  function crossR2(srcId,dstId,xOff){
    const x1=rx(srcId),y1=cy(srcId);
    const x2=lx(dstId),y2=slot2y(dstId);
    const routeX=P[srcId][0]-30-xOff*10;
    return`<path d="M${x1},${y1} H${routeX} V${y2} H${x2}" fill="none" stroke="${CROSS}" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.35"/>`;
  }
  const crossR2Lines=[
    crossR2('W2D','L2A',0),crossR2('W2C','L2B',1),
    crossR2('W2B','L2C',2),crossR2('W2A','L2D',3),
  ].join('');

  // WB SF losers feed LB R4 (WSA loser → L4A slot1, WSB loser → L4B slot1)
  function crossSF(srcId,dstId,xOff){
    const x1=rx(srcId),y1=cy(srcId);
    const x2=lx(dstId),y2=slot1y(dstId);
    const routeX=P[srcId][0]-30-xOff*10;
    return`<path d="M${x1},${y1} H${routeX} V${y2} H${x2}" fill="none" stroke="${CROSS}" stroke-width="1.3" stroke-dasharray="4,3" opacity="0.4"/>`;
  }
  // WF loser → LF slot1
  function crossWF(){
    const x1=rx('WF'),y1=cy('WF');
    const x2=lx('LF'),y2=slot1y('LF');
    const routeX=P['WF'][0]-30;
    return`<path d="M${x1},${y1} H${routeX} V${y2} H${x2}" fill="none" stroke="${CROSS}" stroke-width="1.4" stroke-dasharray="4,3" opacity="0.45"/>`;
  }
  const crossSFLines=crossSF('WSA','L4A',0)+crossSF('WSB','L4B',1)+crossWF();

  // ── Match boxes ──────────────────────────────────────
  const COLORS={wb:[WBC,'#BBDEFB','#F5F9FF'],lb:[LBC,'#FFCDD2','#FFF5F5'],gf:[GFC,'#C8E6C9','#F2F9F2']};
  function box(mdef){
    const p=P[mdef.id];if(!p)return'';
    const[hc,bc,bg]=COLORS[mdef.type]||COLORS.wb;
    const t1=bTeam(mdef.t1),t2=bTeam(mdef.t2);
    const res=bResult(mdef.id);
    const ms=state.bracketMatches[mdef.id];
    let sw1=0,sw2=0;
    ms.sets.forEach(s=>{if(isSetDone(s.s1,s.s2))(+s.s1>+s.s2?sw1++:sw2++);});
    const w1=res&&res.winner===t1,w2=res&&res.winner===t2;
    const n1=esc((t1!==null?tn(t1):srcLbl(mdef.t1)).substring(0,20));
    const n2=esc((t2!==null?tn(t2):srcLbl(mdef.t2)).substring(0,20));
    const score=(sw1>0||sw2>0)?` ${sw1}–${sw2}`:'';
    // Short label for header: strip "WB R1 – partita" → "R1-1"
    const shortHdr=mdef.lbl.replace('Winners Bracket','WB').replace('Losers Bracket','LB')
      .replace('partita ','').replace(' – ','–').replace('Grand Finale','GF').replace('Bella (se necessario)','Bella');
    const [x,y]=p;
    const TEXT_C=w1?'#1B5E20':'#212121';
    const TEXT_C2=w2?'#1B5E20':'#212121';
    const MUTED='#90A4AE';
    const WD=w1?'bold':'normal',WD2=w2?'bold':'normal';
    const isWinner1=w1?`<circle cx="${x+8}" cy="${y+BH*0.27}" r="3.5" fill="#1B5E20"/>`:`<circle cx="${x+8}" cy="${y+BH*0.27}" r="2.5" fill="none" stroke="#BDBDBD" stroke-width="1"/>`;
    const isWinner2=w2?`<circle cx="${x+8}" cy="${y+BH*0.73}" r="3.5" fill="#1B5E20"/>`:`<circle cx="${x+8}" cy="${y+BH*0.73}" r="2.5" fill="none" stroke="#BDBDBD" stroke-width="1"/>`;
    const isTbd1=t1===null,isTbd2=t2===null;
    return`<g>
      <rect x="${x}" y="${y}" width="${BW}" height="${BH}" rx="${R}" fill="${bg}" stroke="${bc}" stroke-width="1"/>
      <rect x="${x}" y="${y}" width="${BW}" height="14" rx="${R}" fill="${hc}"/>
      <rect x="${x}" y="${y+7}" width="${BW}" height="7" fill="${hc}"/>
      <text x="${x+BW/2}" y="${y+10}" text-anchor="middle" font-size="7.5" fill="white" font-family="Arial" font-weight="700" letter-spacing="0.3">${shortHdr}${score}</text>
      <line x1="${x}" y1="${y+14}" x2="${x+BW}" y2="${y+14}" stroke="${bc}" stroke-width="0.5"/>
      <line x1="${x}" y1="${y+BH/2}" x2="${x+BW}" y2="${y+BH/2}" stroke="${bc}" stroke-width="0.4" opacity="0.4"/>
      ${isWinner1}
      <text x="${x+16}" y="${y+BH*0.27+3.5}" font-size="8.5" fill="${isTbd1?MUTED:TEXT_C}" font-family="Arial" font-weight="${WD}" font-style="${isTbd1?'italic':'normal'}">${n1}</text>
      ${isWinner2}
      <text x="${x+16}" y="${y+BH*0.73+3.5}" font-size="8.5" fill="${isTbd2?MUTED:TEXT_C2}" font-family="Arial" font-weight="${WD2}" font-style="${isTbd2?'italic':'normal'}">${n2}</text>
    </g>`;
  }
  const boxes=BRACKET_DEF.map(m=>box(m)).join('');

  // ── Section backgrounds ───────────────────────────────
  const WB_H=840,LB_START=925,LB_H=685,GF_Y=800;
  const bgs=`
    <rect x="0" y="0" width="755" height="${WB_H}" rx="6" fill="#F7FAFF" stroke="#BBDEFB" stroke-width="1"/>
    <rect x="0" y="${LB_START}" width="1130" height="${LB_H}" rx="6" fill="#FFF5F5" stroke="#FFCDD2" stroke-width="1"/>
    <rect x="1135" y="${GF_Y}" width="365" height="90" rx="6" fill="#F2F9F2" stroke="#C8E6C9" stroke-width="1"/>
    <text x="10" y="13" font-size="8" font-weight="700" fill="${WBC}" font-family="Arial" letter-spacing="1" opacity=".7">WINNERS BRACKET</text>
    <text x="10" y="${LB_START+13}" font-size="8" font-weight="700" fill="${LBC}" font-family="Arial" letter-spacing="1" opacity=".7">LOSERS BRACKET</text>
    <text x="1140" y="${GF_Y+13}" font-size="8" font-weight="700" fill="${GFC}" font-family="Arial" letter-spacing="1" opacity=".7">GRAND FINALE</text>`;

  // ── Round headers ─────────────────────────────────────
  const WB_HDR_Y=22,LB_HDR_Y=LB_START+22;
  function rhdr(x,y,lbl,col){
    return`<text x="${x+BW/2}" y="${y}" text-anchor="middle" font-size="7.5" font-weight="700" fill="${col}" font-family="Arial" opacity=".75">${lbl}</text>`;
  }
  const roundHdrs=[
    rhdr(10,WB_HDR_Y,'R1 (×8)',WBC),rhdr(200,WB_HDR_Y,'R2 (×4)',WBC),
    rhdr(390,WB_HDR_Y,'WB Semi.',WBC),rhdr(580,WB_HDR_Y,'WB Finale',WBC),
    rhdr(10,LB_HDR_Y,'LB R1 (×4)',LBC),rhdr(200,LB_HDR_Y,'LB R2 (×4)',LBC),
    rhdr(390,LB_HDR_Y,'LB R3 (×2)',LBC),rhdr(580,LB_HDR_Y,'LB R4 (×2)',LBC),
    rhdr(770,LB_HDR_Y,'LB Semi.',LBC),rhdr(960,LB_HDR_Y,'LB Finale',LBC),
    rhdr(1150,GF_Y+22,'Finale',GFC),rhdr(1340,GF_Y+22,'Bella',GFC),
  ].join('');

  // ── Legend ────────────────────────────────────────────
  const LEG_Y=1635;
  const legend=`
    <rect x="10" y="${LEG_Y}" width="400" height="20" rx="3" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
    <line x1="20" y1="${LEG_Y+10}" x2="44" y2="${LEG_Y+10}" stroke="${WBC}" stroke-width="1.5" opacity=".7"/>
    <text x="48" y="${LEG_Y+13.5}" font-size="7" fill="#555" font-family="Arial">Vincitore avanza</text>
    <line x1="130" y1="${LEG_Y+10}" x2="154" y2="${LEG_Y+10}" stroke="${CROSS}" stroke-width="1.2" stroke-dasharray="4,3" opacity=".5"/>
    <text x="158" y="${LEG_Y+13.5}" font-size="7" fill="#555" font-family="Arial">Perdente passa al LB</text>`;

  const SVG_W=1510,SVG_H=1670;
  return`<svg id="bracket-svg" viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:900px;height:auto;display:block">
  ${bgs}${roundHdrs}
  <g id="cross-lines">${crossLines}${crossR2Lines}${crossSFLines}</g>
  <g id="section-lines">${wbLines}${lbLines}${gfLines}</g>
  <g id="boxes">${boxes}</g>
  ${legend}
  </svg>`;
}

// ═══════════════════════ SAVE ════════════════════════════
function hashPwd(s){
  let h=5381;const k=s+'bv_salt_2025';
  for(let i=0;i<k.length;i++){h=((h<<5)-h)+k.charCodeAt(i);h=h&h;}
  return Math.abs(h).toString(16).padStart(8,'0');
}
function doSave(){
  if(!state.pwdHash){
    const p1=prompt('Crea una password per proteggere il file:');
    if(!p1||!p1.trim())return;
    const p2=prompt('Conferma password:');
    if(p1!==p2){alert('Le password non coincidono.');return;}
    state.pwdHash=hashPwd(p1);
  } else {
    const p=prompt('Inserisci la password per salvare:');
    if(!p){return;}
    if(hashPwd(p)!==state.pwdHash){alert('Password errata. Salvataggio annullato.');return;}
  }
  const json=JSON.stringify(state);
  let html=document.documentElement.outerHTML;
  html=html.replace(/<script id="state-init">[\s\S]*?<\/script>/,
    `<script id="state-init">var SAVED_STATE=${json};<\/script>`);
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='torneo_beach_volley.html';a.click();
  URL.revokeObjectURL(url);
  setTimeout(()=>alert('✅ File salvato! Riaprilo nel browser per continuare.'),100);
}

// ═══════════════════════ HANDLERS ═══════════════════════
function attachHandlers(){
  document.querySelectorAll('.ti').forEach(inp=>{
    inp.addEventListener('input',e=>{state.teams[+e.target.dataset.ti]=e.target.value;});
  });
  document.querySelectorAll('[data-gm]').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const ms=state.groupMatches[e.target.dataset.gm].sets[+e.target.dataset.si];
      const wh=e.target.dataset.wh;
      ms[wh]=wh==='exp'?e.target.checked:e.target.value;
      renderMain();
    });
  });
  document.querySelectorAll('[data-bm]').forEach(inp=>{
    inp.addEventListener('change',e=>{
      state.bracketMatches[e.target.dataset.bm].sets[+e.target.dataset.si][e.target.dataset.w]=e.target.value;
      renderMain();
    });
  });
}
function doGenSeeds(){
  const{seeds,seedsInfo}=computeSeeds();
  state.seeds=seeds;state.seedsInfo=seedsInfo;
  BRACKET_DEF.forEach(m=>{state.bracketMatches[m.id]={sets:[{s1:'',s2:''},{s1:'',s2:''},{s1:'',s2:''}]};});
  state.seedsLocked=true;setTab('tabellone');
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
